<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walkthrough Figure — Oxford, ON</title>
  <link rel="stylesheet" href="theme.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      /* Baseline height; grows if a pair's assessment notes run longer
         (iframe hosts resize via the figure-sized postMessage). */
      min-height: var(--fig-height);
      height: auto;
      padding: 0;
      display: flex;
      overflow: hidden;
    }

    .cols-left {
      flex: 6;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .col-right {
      flex: 3;
      border-left: 1px solid var(--clr-border);
      display: flex;
      flex-direction: column;
    }

    .col-right>.cell-rca { flex: 0 0 auto; }
    .col-right>.cell-qual { flex: 2; }

    /* ── R1C1: Source card ── */
    .cell-source {
      grid-column: 1; grid-row: 1;
      background: #faf6f0;
      border-bottom: 1px solid #e0ddd6;
      border-right: 1px solid var(--clr-border);
      padding: 8px 10px 6px;
      display: flex; flex-direction: column; justify-content: center;
    }
    /* was 7px — bumped to 6pt decorative floor */
    .src-comm { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600; margin-bottom: 2px; }
    .src-name { font-size: 12px; font-weight: 700; color: var(--irpp-navy); line-height: 1.3; margin-bottom: 4px; }
    /* was 8px — bumped to ~7pt content floor */
    .src-detail { font-size: 9.5px; color: #999; line-height: 1.6; }
    .src-detail span { color: #444; font-weight: 500; }

    /* ── R2C1: Similarity bars ── */
    .cell-similar {
      grid-column: 1; grid-row: 2;
      border-right: 1px solid var(--clr-border);
      padding: 4px 3px 4px 0; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .col-title { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--irpp-navy); font-weight: 700; margin-bottom: 2px; margin-left: 8px; flex-shrink: 0; }
    /* was 7.5px — bumped toward 7pt content floor (secondary text) */
    .col-subtitle { font-size: 9px; color: #aaa; margin-bottom: 2px; line-height: 1.3; margin-left: 8px; flex-shrink: 0; }
    .sim-spacer { height: 4px; flex-shrink: 0; }
    .sim-rows { flex: 1; display: flex; flex-direction: column; gap: 0; }
    .sim-row { display: flex; align-items: center; gap: 0; flex: 1; position: relative; min-height: 0; }
    /* was 8px — bumped toward 7pt content floor */
    .sim-rank { width: 14px; font-size: 9px; color: #999; text-align: right; font-weight: 600; flex-shrink: 0; margin-right: 2px; }
    .sim-bar-wrap { flex: 1; height: 80%; position: relative; min-width: 0; }
    .sim-bar { height: 100%; border-radius: 2px; background: var(--irpp-navy-light); position: absolute; left: 0; top: 0; }
    /* was 8px — bumped to ~7pt content floor */
    .sim-label { font-size: 9.5px; color: var(--clr-body); height: 100%; display: flex; align-items: center; padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 1; }

    /* ── R1C2: Context ── */
    .cell-context {
      grid-column: 2; grid-row: 1;
      border-bottom: 1px solid var(--clr-border);
      padding: 8px 10px 6px; background: #fafaf8;
      display: flex; flex-direction: column; justify-content: center;
    }
    .ctx-title { font-size: 10px; font-weight: 700; color: var(--clr-body); margin-bottom: 4px; line-height: 1.3; }
    /* was 8px — bumped to ~7pt content floor */
    .ctx-body { font-size: 9.5px; color: #666; line-height: 1.5; }

    /* ── R2C2: Viability heatmap ── */
    .cell-filtered {
      grid-column: 2; grid-row: 2;
      padding: 4px 4px; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .hm-grid { flex: 1; display: flex; flex-direction: column; gap: 0; }
    .hm-header { display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; height: 14px; flex-shrink: 0; border-bottom: 1px solid #ddd; }
    /* was 6.5px — bumped to 6pt decorative floor */
    .hm-h-col { font-size: 8px; text-transform: uppercase; letter-spacing: 0.4px; color: #999; font-weight: 600; text-align: center; }
    .hm-data-rows { flex: 1; display: flex; flex-direction: column; gap: 0; }
    .hm-row { display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; flex: 1; min-height: 0; border-bottom: 1px solid #f2f2f2; }
    .hm-row:last-child { border-bottom: none; }
    .hm-row.hm-pass { background: #f0faf2; }
    .hm-dot { text-align: center; font-size: 10px; }
    .hm-ok { color: #27ae60; }
    .hm-fail { color: #e74c3c; }
    .hm-warn { color: #f39c12; }

    /* ── R1C3: Skill gap preview ── */
    .cell-rca { padding: 8px 10px 6px; background: #fff; border-bottom: 1px solid var(--clr-border); overflow: hidden; }
    /* was 7px — bumped to 6pt decorative floor */
    .rca-title { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--irpp-navy); font-weight: 700; margin-bottom: 3px; }
    /* was 9px — bumped to ~7pt content floor */
    .rca-pair { font-size: 10px; font-weight: 600; color: var(--clr-body); margin-bottom: 3px; line-height: 1.3; }
    .rca-pair .from { color: var(--irpp-red); font-weight: 700; }
    .rca-pair .to { color: var(--irpp-teal); font-weight: 700; }
    /* was 8px — bumped toward 7pt content floor (secondary text) */
    .rca-hint { font-size: 9px; color: #aaa; line-height: 1.3; margin-bottom: 2px; }
    .rca-bars { margin-top: 12px; }
    .rca-bar-row { margin-bottom: 5px; }
    /* was 7.5px — bumped toward 7pt content floor */
    .rca-bar-label { font-size: 9px; color: #666; margin-bottom: 1px; line-height: 1.15; }
    .rca-plot { position: relative; }
    .rca-ref { position: absolute; top: -1px; bottom: -1px; width: 0; border-left: 1px dashed #b9b9b9; z-index: 2; }
    .rca-bar { height: 5px; border-radius: 1px; margin-bottom: 1px; min-width: 1px; }
    .rca-bar.src { background: var(--irpp-red); }
    .rca-bar.tgt { background: var(--irpp-teal); }

    /* ── R2C3: Assessment notes ── */
    .cell-qual { padding: 6px 10px 4px; background: #faf9f7; overflow: hidden; display: flex; flex-direction: column; }
    /* was 7px — bumped to 6pt decorative floor */
    .qual-title { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--irpp-navy); font-weight: 700; margin-bottom: 4px; flex-shrink: 0; }
    .qual-item { margin-bottom: 3px; padding-left: 6px; border-left: 2px solid #ddd; flex-shrink: 0; }
    .qual-item.up { border-left-color: #27ae60; }
    .qual-item.down { border-left-color: #e74c3c; }
    /* was 8px — bumped to ~7pt content floor */
    .qual-occ { font-size: 9.5px; font-weight: 600; color: var(--clr-body); }
    /* was 7.5px — bumped toward 7pt content floor (secondary text) */
    .qual-explain { font-size: 9px; color: #888; line-height: 1.35; margin-top: 1px; }
    /* was 7px — bumped with note titles */
    .qual-arrow { font-size: 8px; margin-right: 2px; }
    .qual-arrow.up { color: #27ae60; }
    .qual-arrow.down { color: #e74c3c; }
    .qual-callout { margin-top: auto; padding: 5px 8px; background: var(--clr-bg-muted); border-radius: 3px; border-left: 3px solid var(--irpp-navy); }
    /* was 7.5px — bumped toward 7pt content floor */
    .qual-callout p { font-size: 9px; color: #444; line-height: 1.5; font-style: italic; margin: 0; }

    .tt-trigger {
      text-decoration: underline dotted #27ae60;
      font-weight: 600;
      cursor: pointer;
      color: inherit;
    }
    .tt-trigger:hover {
      color: #219653;
    }
    .occ-title-tt {
      text-decoration: underline dotted #888;
      cursor: help;
    }
    .tt-comm-box { padding: 4px; }
    /* tooltip text: was 8.5/7.5/7.5px — bumped with content floors */
    .tt-comm-title { font-weight: 700; font-size: 9.5px; margin-bottom: 4px; color: var(--irpp-navy); }
    .tt-comm-text { color: #444; font-size: 9px; line-height: 1.4; }
    .tt-divider { margin: 6px 0; border: 0; border-top: 1px solid #e5e7eb; }
    .tt-value-small { font-size: 9px; }

    /* ── COMPACT (<640px iframe width) — lossy per 2026-07-08 decisions:
       stacked single column; similarity bars and the 5-screen dot matrix
       merge into one candidate list (top 7); assessment notes trimmed to
       the callout + 2 items. Desktop 3-column layout untouched. ── */
    html.compact .figure-container { width: 100%; min-height: 0; display: block; }
    html.compact .dev-wrapper { padding: 8px; }
    html.compact .col-right { display: none; }
    html.compact .cols-left { display: block; }

    html.compact .cw-source { background: #faf6f0; border-bottom: 1px solid #e0ddd6; padding: 10px 12px; }
    html.compact .cw-comm { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 600; }
    html.compact .cw-name { font-size: 15px; font-weight: 700; color: var(--irpp-navy); line-height: 1.3; margin: 2px 0 4px; }
    html.compact .cw-detail { font-size: 12px; color: #777; line-height: 1.55; }
    html.compact .cw-detail span { color: #333; font-weight: 600; }

    html.compact .cw-sec-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--irpp-navy); font-weight: 700; padding: 12px 12px 2px; }
    html.compact .cw-legend { font-size: 11px; color: #999; padding: 0 12px 6px; line-height: 1.4; }
    html.compact .cw-headrow {
      display: grid; grid-template-columns: 1fr repeat(5, 32px);
      align-items: end; padding: 0 12px 3px; border-bottom: 1px solid #ddd;
    }
    html.compact .cw-h-screen {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2px;
      color: #888; text-align: center; text-decoration: underline dotted; text-underline-offset: 2px;
    }
    html.compact .cw-row {
      display: grid; grid-template-columns: 1fr repeat(5, 32px);
      align-items: center; padding: 2px 12px; border-bottom: 1px solid #f2f2f2;
    }
    html.compact .cw-row.cw-pass { background: #f0faf2; }
    html.compact .cw-cand { display: flex; align-items: center; gap: 4px; min-width: 0; padding-right: 6px; }
    html.compact .cw-rank { font-size: 11px; color: #999; font-weight: 600; width: 16px; text-align: right; flex-shrink: 0; }
    html.compact .cw-barwrap { position: relative; flex: 1; height: 24px; min-width: 0; }
    html.compact .cw-bar { position: absolute; left: 0; top: 0; height: 100%; background: var(--irpp-navy-light); border-radius: 2px; }
    html.compact .cw-label { position: relative; z-index: 1; font-size: 12px; line-height: 24px; padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    html.compact .cw-dot { text-align: center; font-size: 13px; }
    html.compact .cw-more { font-size: 11.5px; color: #999; font-style: italic; padding: 6px 12px 2px; }

    /* Reused desktop cells, scaled to the 12px floor */
    html.compact .cell-rca { border-bottom: 1px solid var(--clr-border); padding: 12px; overflow: visible; }
    html.compact .rca-title { font-size: 12px; }
    html.compact .rca-pair { font-size: 13px; margin-bottom: 4px; }
    html.compact .rca-hint { font-size: 11.5px; }
    html.compact .rca-bar-label { font-size: 11.5px; margin-bottom: 2px; }
    html.compact .rca-bar { height: 7px; }
    html.compact .rca-bar-row { margin-bottom: 8px; }
    html.compact .cell-qual { padding: 12px; overflow: visible; }
    html.compact .qual-title { font-size: 12px; }
    html.compact .qual-item { margin-bottom: 6px; padding-left: 8px; }
    html.compact .qual-occ { font-size: 12.5px; }
    html.compact .qual-explain { font-size: 11.5px; }
    html.compact .qual-arrow { font-size: 11px; }
    html.compact .qual-callout { margin-top: 8px; }
    html.compact .qual-callout p { font-size: 11.5px; }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="iframe-controls">
      <div class="control-group">
        <label>Community</label>
        <select id="ui-community"></select>
      </div>
      <div class="control-group">
        <label>Source</label>
        <select id="ui-source"></select>
      </div>
    </div>
    <div class="figure-container">
      <div class="cols-left" id="grid-left"></div>
      <div class="col-right" id="grid-right"></div>
    </div>
  </div>

  <script>
    let currentMetric = (new URLSearchParams(location.search).get('metric') === 'euclidean') ? 'euclidean' : 'cosine';
    const CACHE = {};

    // Screen definitions (shared by the desktop heatmap headers and the
    // compact merged candidate list).
    const hmDefs = {
      TEER: 'Training alignment — candidate TEER within the accepted window around the source occupation’s (comparable, or more extensive training).',
      Wages: 'Earnings differential — provincial median income ≥ 65% of the source occupation’s. Amber = passes but below parity.',
      COPS: 'Occupational outlook — federal COPS projections; fails on projected labour surplus.',
      AI: 'AI exposure — Dais (2025) ratings; high exposure excluded.',
      'Qual.': 'Qualitative community review — curated pick (green), susceptible-sector exclusion (red), or no local presence (amber). Approximated from IRPP community profiles.',
    };

    // Tooltip wiring shared by both render modes.
    function attachTips() {
      if (typeof tippy === 'undefined') return;
      document.querySelectorAll('[data-tt-label]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${el.dataset.ttLabel}</div>`
            + `<div class="tt-value">Similarity: ${el.dataset.ttSim}</div>`
            + `<div class="tt-value">TEER: ${el.dataset.ttTeer}</div>`,
          allowHTML: true,
          placement: 'right',
          appendTo: document.body,
        });
      });

      // Screening headers + RCA preview rows: "title|body" data-tips.
      document.querySelectorAll('[data-tip]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const [tipTitle, tipBody] = el.dataset.tip.split('|');
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${tipTitle}</div><div class="tt-value">${tipBody}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Dynamic community review tooltips
      document.querySelectorAll('.tt-trigger').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const cd = el.getAttribute('data-tt-cd');
        const ratHtml = el.getAttribute('data-tt-rat') || '';
        const basePara = COMMUNITY_TOOLTIPS[cd] || 'Local community profile context.';
        
        let content = `<div class="tt-comm-box">`;
        content += `<div class="tt-comm-title">Simulated Community Review</div>`;
        content += `<div class="tt-comm-text">${basePara}</div>`;
        if (ratHtml) {
          content += ratHtml;
        }
        content += `</div>`;
        
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: content,
          allowHTML: true,
          interactive: true,
          trigger: 'click mouseenter',
          appendTo: document.body,
        });
      });

      // Occupation title tooltips
      document.querySelectorAll('.occ-title-tt').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Screen dot tooltips
      document.querySelectorAll('.screen-dot').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });
    }

    function getDotTooltip(col, c, t) {
      const parts = [];
      const prW = c.pr_workers != null ? Math.round(c.pr_workers).toLocaleString() : '0';
      parts.push(`<strong>Provincial workers:</strong> ${prW}`);
      
      const sl = t.source_lmi || {};
      const srcInc = sl.pr_income || 0;
      
      if (col === 'teer') {
        const delta = c.teer - t.source_teer;
        let deltaText = '';
        if (delta === 0) {
          deltaText = 'same level of educational requirements';
        } else if (delta > 0) {
          deltaText = `${delta} level(s) less of educational requirements`;
        } else {
          deltaText = `${Math.abs(delta)} level(s) more of educational requirements`;
        }
        parts.push(`<strong>TEER ${c.teer}:</strong> ${deltaText}`);
      } else if (col === 'wages') {
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const pct = Math.round(Math.abs(wRatio - 1) * 100);
        const rel = wRatio >= 1.0 ? 'higher' : 'lower';
        const incomeStr = c.pr_income != null ? '$' + Math.round(c.pr_income).toLocaleString() : '—';
        if (srcInc > 0) {
          parts.push(`<strong>Income:</strong> ${incomeStr} (${pct}% ${rel} than source)`);
        } else {
          parts.push(`<strong>Income:</strong> ${incomeStr}`);
        }
      } else if (col === 'cops') {
        parts.push(`<strong>COPS outlook:</strong> ${c.cops || 'Unknown'}`);
      } else if (col === 'ai') {
        parts.push(`<strong>AI exposure:</strong> ${c.ai || 'Unknown'}`);
      } else if (col === 'qual') {
        const reasons = [];
        if (c.screen_local_presence === false) {
          reasons.push('No local workers');
        }
        if (c.screen_susceptible === false) {
          reasons.push('Lack of alignment with simulated community review');
        }
        if (reasons.length === 0) {
          reasons.push('Passed qualitative review');
        }
        parts.push(`<strong>Qualitative:</strong> ${reasons.join(' & ')}`);
      }
      return parts.join('<hr class="tt-divider">');
    }

    const COMMUNITY_TOOLTIPS = {
      "1003": "Division No. 3 relies heavily on maritime transport (such as regional ferry operations) and marine harvesting. Long-term transitions face a vulnerable resource base, but are supported locally by municipal public works and infrastructure demand from reconstruction projects.",
      "3532": "Oxford's economy is integrated with automotive assembly and related manufacturing. Motor vehicle parts manufacturing and regional logistics along the Highway 401 corridor provide alternative transition avenues, alongside southwestern Ontario's broader plastics and metalworking corridors.",
      "3557": "Algoma's economy is historically anchored by steel manufacturing. As primary metal industries adopt low-emission technologies, local transition planning leverages regional assets in forestry, metal fabrication, and critical mineral development.",
      "4615": "Neepawa has a dual-sector economy built on agriculture and food manufacturing (anchored by major meat packing operations). Local opportunities bridge between agricultural management, food processing, and public infrastructure maintenance.",
      "4701": "Estevan relies on a mix of agriculture and energy sectors (coal mining, coal-fired power plants, and oil/gas extraction). As traditional energy generation undergoes transitions, the region leverages a strong transport logistics base (rail corridor), municipal public works, and college training programs.",
      "4816": "Division No. 16 is highly dependent on oilsands extraction and related industrial maintenance, where employment is sensitive to global commodity markets, decarbonization targets, and automation. Transition pathways in the region align with local opportunities in heavy maintenance, welding, electrical servicing, and construction logistics.",
      "PR61": "The Northwest Territories has a hybrid economy combining resource extraction (diamond mines and critical minerals) with a large public services sector. Regional pathways focus on maintaining vital community infrastructure, transport networks, and public utilities."
    };

    // ── COMPACT render branch (same data, stacked, lossy) ──
    function buildCompactWalkthrough(t) {
      const cands = t.candidates.slice(0, 7);
      const nTrimmed = t.candidates.length - cands.length;
      const sl = t.source_lmi || {};
      const barW = sim => ((sim - 0.70) / 0.30) * 100;
      const fmt$ = v => v != null ? '$' + Math.round(v).toLocaleString() : '—';
      const fmtW = v => v != null ? Math.round(v).toLocaleString() : '—';
      const geoWord = (t.cd || '').startsWith('PR') ? 'Territorial' : 'Provincial';

      // Same screen derivation as the desktop heatmap.
      const srcInc = sl.pr_income || 0;
      function deriveFilters(c) {
        const teer = c.teer <= t.source_teer ? 'green'
          : c.teer === t.source_teer + 1 ? 'yellow' : 'red';
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const wages = wRatio >= 1.0 ? 'green' : wRatio >= 0.65 ? 'yellow' : 'red';
        const cops = ((c.cops || '').toLowerCase()).includes('surplus') ? 'red' : 'green';
        const ai = ((c.ai || '').toLowerCase()).includes('high') ? 'red' : 'green';
        const qual = c.qual_signal || 'green';
        return { teer, wages, cops, ai, qual };
      }
      const dotHtml = (sig, tooltipText) => `<div class="cw-dot ${sig === 'green' ? 'hm-ok' : sig === 'yellow' ? 'hm-warn' : 'hm-fail'} screen-dot" data-tippy-content="${tooltipText.replace(/"/g, '&quot;')}">●</div>`;

      let html = '';

      // 1 — Source card
      html += `<div class="cw-source">
        <div class="cw-comm">${t.community}</div>
        <div class="cw-name">${t.source_label}</div>
        <div class="cw-detail">TEER level <span>${t.source_teer}</span> · Sector: <span>${t.sector}</span></div>
        <div class="cw-detail">${geoWord} income <span>${fmt$(sl.pr_income)}</span> · workers <span>${fmtW(sl.pr_workers)}</span></div>
      </div>`;

      // 2 — Merged candidates: similarity bar + 5 screening dots per row
      const compactHeads = { TEER: 'TEER', Wages: 'Wage', COPS: 'COPS', AI: 'AI', 'Qual.': 'Qual' };
      html += `<div class="cw-sec-title">Skill-similar candidates &amp; screening</div>`;
      html += `<div class="cw-legend">Bar length = skills similarity · <span class="hm-ok">●</span><span class="hm-warn">●</span> = pass, <span class="hm-fail">●</span> = fail · tap a heading or row for detail</div>`;
      html += `<div class="cw-headrow"><div></div>` + Object.keys(hmDefs).map(k =>
        `<div class="cw-h-screen" data-tip="${k === 'Qual.' ? 'Qual' : k}|${hmDefs[k].replace(/"/g, '&quot;')}">${compactHeads[k]}</div>`).join('') + `</div>`;
      cands.forEach(c => {
        const f = deriveFilters(c);
        const allGreen = f.teer !== 'red' && f.wages !== 'red'
          && f.cops === 'green' && f.ai === 'green' && f.qual === 'green';
        html += `<div class="cw-row ${allGreen ? 'cw-pass' : ''}" data-tt-label="${c.label}" data-tt-sim="${c.similarity.toFixed(3)}" data-tt-teer="${c.teer}">
          <div class="cw-cand">
            <span class="cw-rank">${c.rank}</span>
            <div class="cw-barwrap">
              <div class="cw-bar" style="width:${barW(c.similarity)}%"></div>
              <div class="cw-label">${c.label}</div>
            </div>
          </div>
          ${dotHtml(f.teer, getDotTooltip('teer', c, t))}${dotHtml(f.wages, getDotTooltip('wages', c, t))}${dotHtml(f.cops, getDotTooltip('cops', c, t))}${dotHtml(f.ai, getDotTooltip('ai', c, t))}${dotHtml(f.qual, getDotTooltip('qual', c, t))}
        </div>`;
      });
      if (nTrimmed > 0) html += `<div class="cw-more">+${nTrimmed} more candidate${nTrimmed > 1 ? 's' : ''} in the full (desktop) figure</div>`;

      // 3 — Skill gap preview (same markup as desktop, scaled by CSS)
      const fg = t.featured_gap;
      html += `<div class="cell-rca">`;
      html += `<div class="rca-title">Skill gap preview</div>`;
      if (fg && fg.bars && fg.bars.length > 0) {
        html += `<div class="rca-pair"><span class="from">${t.source_label}</span> → <span class="to">${fg.target_label}</span></div>`;
        html += `<div class="rca-hint">${fg.summary.shared} shared competencies · ${fg.summary.gaps} training gaps</div>`;
        const maxLq = Math.max(...fg.bars.flatMap(b => [b.source_lq, b.target_lq]), 1.1);
        const refPct = (1 / maxLq) * 100;
        html += `<div class="rca-bars">`;
        fg.bars.forEach(b => {
          const rowTip = `${b.dimension}|${t.source_label} RCA: ${b.source_lq.toFixed(2)} · ${fg.target_label} RCA: ${b.target_lq.toFixed(2)}. RCA > 1 = relied on more than the average occupation; the difference is the training gap.`;
          html += `<div class="rca-bar-row" data-tip="${rowTip.replace(/"/g, '&quot;')}">
            <div class="rca-bar-label">${b.dimension}</div>
            <div class="rca-plot">
              <div class="rca-ref" style="left:${refPct}%"></div>
              <div class="rca-bar src" style="width:${(b.source_lq / maxLq) * 100}%"></div>
              <div class="rca-bar tgt" style="width:${(b.target_lq / maxLq) * 100}%"></div>
            </div>
          </div>`;
        });
        html += `</div></div>`;
      } else {
        html += `<div class="rca-hint">No skill-gap data available for this pair's top matches.</div></div>`;
      }

      // 4 — Assessment notes, trimmed: first 2 items + callout
      const an = t.assessment_notes || { notes: [] };
      const callout = an.notes.find(n => n.type === 'callout');
      const items = an.notes.filter(n => n.type !== 'callout');
      const shown = items.slice(0, 2);
      html += `<div class="cell-qual">`;
      html += `<div class="qual-title">Assessment notes</div>`;
      shown.forEach(note => {
        const arrow = note.type === 'up' ? '↑' : '↓';
        const labelsHtml = formatNoteTitle(note.labels, arrow, note.type);
        html += `<div class="qual-item ${note.type}">
          <div class="qual-occ">${labelsHtml}</div>
          <div class="qual-explain">${note.text}</div>
        </div>`;
      });
      if (items.length > shown.length) {
        html += `<div class="cw-more">+${items.length - shown.length} more note${items.length - shown.length > 1 ? 's' : ''} in the full (desktop) figure</div>`;
      }
      if (callout) html += `<div class="qual-callout"><p>${callout.text}</p></div>`;
      html += `</div>`;

      document.getElementById('grid-left').innerHTML = html;
      document.getElementById('grid-right').innerHTML = '';

      attachTips();
      reportSize();
    }

    function formatNoteTitle(labels, arrow, type) {
      if (!labels || labels.length === 0) return '';
      let titleText = '';
      if (labels.length <= 3) {
        if (labels.length === 1) {
          titleText = labels[0].text;
        } else if (labels.length === 2) {
          titleText = `${labels[0].text} and ${labels[1].text}`;
        } else {
          titleText = `${labels[0].text}, ${labels[1].text}, and ${labels[2].text}`;
        }
      } else {
        titleText = `${labels[0].text}, ${labels[1].text}, and ${labels.length - 2} more`;
      }
      const tipParts = labels.map(lbl => {
        return `<strong>NOC ${lbl.noc}:</strong> ${lbl.full_title} <span style="opacity: 0.8; font-style: italic;">(#${lbl.rank})</span>`;
      });
      const tipContent = tipParts.join('<span style="margin: 0 6px; opacity: 0.5;">·</span>');
      return `<span class="occ-title-tt" data-tippy-content="${tipContent.replace(/"/g, '&quot;')}"><span class="qual-arrow ${type}">${arrow}</span> ${titleText}</span>`;
    }

    function buildWalkthrough(t) {
      if (window.isCompact && window.isCompact()) { buildCompactWalkthrough(t); return; }
      const cands = t.candidates;
      const sl = t.source_lmi || {};
      const barW = sim => ((sim - 0.70) / 0.30) * 100;

      function fmt$(v) { return v != null ? '$' + Math.round(v).toLocaleString() : '\u2014'; }
      function fmtW(v) { return v != null ? Math.round(v).toLocaleString() : '\u2014'; }
      function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }

      // Derive viability signals
      const srcInc = sl.pr_income || 0;
      function deriveFilters(c) {
        const delta = c.teer - t.source_teer;
        const teer = (c.teer < 2 || delta < -2 || delta > 1) ? 'red' : (delta < 0 ? 'yellow' : 'green');
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const wages = wRatio >= 1.0 ? 'green'
          : wRatio >= 0.65 ? 'yellow' : 'red';
        const copsRaw = (c.cops || '').toLowerCase();
        const cops = copsRaw.includes('surplus') ? 'red' : 'green';
        const aiRaw = (c.ai || '').toLowerCase();
        const ai = aiRaw.includes('high') ? 'red' : 'green';
        const qual = c.qual_signal || 'green';
        return { teer, wages, cops, ai, qual };
      }

      // Dot sizing by provincial workers (log scale)
      const workers = cands.map(c => c.pr_workers || 1);
      const logMin = Math.log(Math.min(...workers));
      const logMax = Math.log(Math.max(...workers));
      const logRange = logMax - logMin || 1;
      function dotSize(w) {
        const t = (Math.log(w || 1) - logMin) / logRange;
        return 9 + t * 7;
      }
      function sigDot(signal, sz, tooltipText) {
        const cls = signal === 'green' ? 'hm-ok'
          : signal === 'yellow' ? 'hm-warn' : 'hm-fail';
        return `<div class="hm-dot ${cls} screen-dot" style="font-size:${sz.toFixed(1)}px" data-tippy-content="${tooltipText.replace(/"/g, '&quot;')}">\u25CF</div>`;
      }

      let left = '';
      let right = '';
      const geoWord = (t.cd || '').startsWith('PR') ? 'Territorial' : 'Provincial';

      // ═══ R1C1: Source card ═══
      left += `<div class="cell-source">
      <div class="src-comm">${t.community}</div>
      <div class="src-name">${t.source_label}</div>
      <div class="src-detail">TEER level <span>${t.source_teer}</span></div>
      <div class="src-detail">${geoWord} income: <span>${fmt$(sl.pr_income)}</span></div>
      <div class="src-detail">${geoWord} workers: <span>${fmtW(sl.pr_workers)}</span></div>
      <div class="src-detail">Sector: <span>${t.sector}</span></div>
    </div>`;

      // ═══ R2C1: Similarity bars ═══
      left += `<div class="cell-similar">`;
      left += `<div class="col-title">Skill-similar</div>`;
      left += `<div class="col-subtitle">Evaluated across skills, knowledge, abilities, and work context</div>`;
      left += `<div class="sim-spacer"></div>`;
      left += `<div class="sim-rows">`;
      cands.forEach(c => {
        left += `<div class="sim-row" data-tt-label="${c.label}" data-tt-sim="${c.similarity.toFixed(3)}" data-tt-teer="${c.teer}" data-tt-noc="${c.noc || ''}">
        <div class="sim-rank">${c.rank}</div>
        <div class="sim-bar-wrap">
          <div class="sim-bar" style="width:${barW(c.similarity)}%"></div>
          <div class="sim-label">${trunc(c.label, 30)}</div>
        </div>
      </div>`;
      });
      left += `</div></div>`;

      // ═══ R1C2: Context ═══
      left += `<div class="cell-context">
      <div class="ctx-title">From similar to viable</div>
      <div class="ctx-body">
        Each candidate is screened for economic viability: comparable income,
        sector independence, and local presence. A qualitative review then
        confirms community fit.
      </div>
    </div>`;

      // ═══ R2C2: Viability heatmap ═══
      left += `<div class="cell-filtered">`;
      left += `<div class="col-title">Viability screening</div>`;
      left += `<div class="col-subtitle"><span class="hm-ok">\u25CF</span><span class="hm-warn">\u25CF</span> = pass \u00a0\u00a0 size = provincial workers</div>`;
      left += `<div class="hm-grid">`;
      left += `<div class="hm-header">` + Object.keys(hmDefs).map(k =>
        `<div class="hm-h-col" data-tip="${k === 'Qual.' ? 'Qual' : k}|${hmDefs[k].replace(/"/g, '&quot;')}">${k}</div>`).join('') + `</div>`;
      left += `<div class="hm-data-rows">`;
      cands.forEach(c => {
        const f = deriveFilters(c);
        const allGreen = f.teer !== 'red' && f.wages !== 'red'
          && f.cops === 'green' && f.ai === 'green' && f.qual === 'green';
        const rowCls = allGreen ? 'hm-pass' : '';
        const sz = dotSize(c.pr_workers);
        left += `<div class="hm-row ${rowCls}">
        ${sigDot(f.teer, sz, getDotTooltip('teer', c, t))}
        ${sigDot(f.wages, sz, getDotTooltip('wages', c, t))}
        ${sigDot(f.cops, sz, getDotTooltip('cops', c, t))}
        ${sigDot(f.ai, sz, getDotTooltip('ai', c, t))}
        ${sigDot(f.qual, sz, getDotTooltip('qual', c, t))}
      </div>`;
      });
      left += `</div></div></div>`;

      // ═══ R1C3: Skill gap preview ═══
      const fg = t.featured_gap;
      right += `<div class="cell-rca">`;
      right += `<div class="rca-title">Skill gap preview</div>`;
      if (fg && fg.bars && fg.bars.length > 0) {
        right += `<div class="rca-pair">
        <span class="from">${t.source_label}</span>
        \u2192
        <span class="to">${fg.target_label}</span>
      </div>`;
        right += `<div class="rca-hint">${fg.summary.shared} shared competencies · ${fg.summary.gaps} training gaps</div>`;
        const maxLq = Math.max(...fg.bars.flatMap(b => [b.source_lq, b.target_lq]), 1.1);
        const refPct = (1 / maxLq) * 100;
        right += `<div class="rca-bars">`;
        fg.bars.forEach(b => {
          const srcPct = (b.source_lq / maxLq) * 100;
          const tgtPct = (b.target_lq / maxLq) * 100;
          const dimLabel = b.dimension;
          const rowTip = `${dimLabel}|${t.source_label} RCA: ${b.source_lq.toFixed(2)} · ${fg.target_label} RCA: ${b.target_lq.toFixed(2)}. RCA > 1 = relied on more than the average occupation; the difference is the training gap.`;
          right += `<div class="rca-bar-row" data-tip="${rowTip.replace(/"/g, '&quot;')}">
          <div class="rca-bar-label">${dimLabel}</div>
          <div class="rca-plot">
            <div class="rca-ref" style="left:${refPct}%"></div>
            <div class="rca-bar src" style="width:${srcPct}%"></div>
            <div class="rca-bar tgt" style="width:${tgtPct}%"></div>
          </div>
        </div>`;
        });
        right += `</div></div>`;
      } else {
        right += `<div class="rca-hint">No skill-gap data available for this pair's top matches.</div></div>`;
      }

      // ═══ R2C3: Assessment notes ═══
      right += `<div class="cell-qual">`;
      right += `<div class="qual-title">Assessment notes</div>`;
      const an = t.assessment_notes || { notes: [] };
      an.notes.forEach(note => {
        if (note.type === 'callout') {
          right += `<div class="qual-callout"><p>${note.text}</p></div>`;
        } else {
          const arrow = note.type === 'up' ? '↑' : '↓';
          const labelsHtml = formatNoteTitle(note.labels, arrow, note.type);
          right += `<div class="qual-item ${note.type}">
            <div class="qual-occ">${labelsHtml}</div>
            <div class="qual-explain">${note.text}</div>
          </div>`;
        }
      });
      right += `</div>`;

      document.getElementById('grid-left').innerHTML = left;
      document.getElementById('grid-right').innerHTML = right;

      attachTips();
      reportSize();
    }

    let activeCd = '3532';
    let activeSrc = '75101';

    const uiCommunity = document.getElementById('ui-community');
    const uiSource = document.getElementById('ui-source');

    function populateControls(FULL_DATA) {
      if (!uiCommunity || !uiSource) return;
      
      let tempCd = activeCd;
      uiCommunity.innerHTML = '';
      for (const cd in FULL_DATA) {
        const firstSrc = Object.keys(FULL_DATA[cd])[0];
        const opt = document.createElement('option');
        opt.value = cd;
        opt.textContent = FULL_DATA[cd][firstSrc].community;
        if (cd === tempCd) opt.selected = true;
        uiCommunity.appendChild(opt);
      }
      
      function updateSources() {
        uiSource.innerHTML = '';
        const cd = uiCommunity.value;
        const sources = FULL_DATA[cd];
        let foundActive = false;
        for (const src in sources) {
          const opt = document.createElement('option');
          opt.value = src;
          opt.textContent = sources[src].source_label;
          if (src === activeSrc) {
            opt.selected = true;
            foundActive = true;
          }
          uiSource.appendChild(opt);
        }
        if (!foundActive && uiSource.options.length > 0) {
          activeSrc = uiSource.options[0].value;
          uiSource.options[0].selected = true;
        }
      }
      
      updateSources();

      uiCommunity.onchange = (e) => {
        activeCd = e.target.value;
        updateSources();
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };

      uiSource.onchange = (e) => {
        activeSrc = e.target.value;
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };
    }

    function loadAndRender(metric) {
      if (CACHE[metric]) { 
        populateControls(CACHE[metric]);
        buildWalkthrough(CACHE[metric][activeCd][activeSrc]); 
        return; 
      }
      fetch(`../data/D_walkthrough.all.${metric}.json`)
        .then(r => r.json())
        .then(DATA => { 
          CACHE[metric] = DATA; 
          populateControls(DATA);
          buildWalkthrough(DATA[activeCd][activeSrc]); 
        });
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      const ctrls = document.querySelector('.iframe-controls');
      let h = document.querySelector('.dev-wrapper').scrollHeight;
      
      if (c) parent.postMessage({ type: 'figure-sized', fig: 'D_walkthrough', width: c.scrollWidth, height: h }, '*');
    }

    // Listen for in-place metric switch or active pair switch from parent
    window.addEventListener('message', e => {
      if (!e.data) return;
      let needsRender = false;
      
      if (e.data.type === 'set-metric' && e.data.metric && e.data.metric !== currentMetric) {
        currentMetric = e.data.metric;
        needsRender = true;
      }
      
      if (e.data.type === 'set-active-pair') {
        if (e.data.cd && e.data.cd !== activeCd) { activeCd = e.data.cd; needsRender = true; }
        if (e.data.src && e.data.src !== activeSrc) { activeSrc = e.data.src; needsRender = true; }
      }
      
      if (needsRender) loadAndRender(currentMetric);
    });

    window.addEventListener('compactmodechange', () => loadAndRender(currentMetric));

    loadAndRender(currentMetric);
  </script>

<!-- CTP WP Engine Embed Helper -->
<script>
  if (window.self !== window.top) {
    document.body.classList.add('export-mode');
    window.addEventListener('load', () => {
      setTimeout(() => {
        const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
        const ctrls = document.querySelector('.iframe-controls');
        let h = document.querySelector('.dev-wrapper').scrollHeight;
        
        if (c) {
          const fig = location.pathname.split('/').pop().replace('.html', '');
          parent.postMessage({
            type: 'figure-sized',
            fig: fig,
            width: c.scrollWidth,
            height: h
          }, '*');
        }
      }, 100);
    });
  }
</script>
