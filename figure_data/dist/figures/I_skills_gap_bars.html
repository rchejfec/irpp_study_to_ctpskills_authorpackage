<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skills Gap — Layered Bar Chart</title>
  <link rel="stylesheet" href="../theme.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      height: var(--fig-height);
      padding: 8px 10px;
      display: flex;
      gap: 10px;
    }

    .panel {
      flex: 1;
      border: 1px solid var(--clr-border);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header: two-column, no internal border ── */
    .panel-header {
      display: flex;
      background: var(--clr-bg-muted);
      border-bottom: 1px solid var(--clr-border);
      min-height: 42px;
      flex-shrink: 0;
    }

    .header-col {
      flex: 1;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-role {
      font-size: 6.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1;
      margin-bottom: 2px;
    }

    .header-occ {
      font-size: 9px;
      font-weight: 700;
      line-height: 1.25;
    }

    .header-col.source .header-role { color: var(--clr-body-secondary); }
    .header-col.source .header-occ { color: var(--irpp-red); }
    .header-col.target { text-align: right; }
    .header-col.target .header-role { color: var(--clr-body-secondary); }
    .header-col.target .header-occ { color: var(--irpp-teal); }

    /* ── Chart ── */
    .chart-area {
      flex: 1;
      position: relative;
    }

    /* ── COMPACT (<640px iframe width) — lossy per 2026-07-08 decisions:
       one pathway panel instead of two side-by-side, type scaled to the
       12px floor. The second pathway stays reachable via set-active-pair. ── */
    html.compact .figure-container { width: 100%; height: auto; padding: 8px; }
    html.compact .dev-wrapper { padding: 8px; }
    html.compact .panel-header { min-height: 48px; }
    html.compact .header-role { font-size: 10px; }
    html.compact .header-occ { font-size: 13px; }
    html.compact .chart-area { flex: none; height: 380px; }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="iframe-controls">
      <div class="control-group">
        <label>Community</label>
        <select id="ui-community"></select>
      </div>
      <div class="control-stack">
        <div class="control-group">
          <label>Source</label>
          <select id="ui-source"></select>
        </div>
        <div class="control-group" id="ui-tgt-group">
          <label>Target</label>
          <select id="ui-target"></select>
        </div>
      </div>
    </div>
    <div class="figure-container" id="figure-container">
    </div>
  </div>

  <script>
    let activeCd = '3532';
    let activeSrc = '75101';
    let activeTgt = 'default';
    const CACHE = { PAIRS: null };

    // Wrap a label to at most two balanced lines on word boundaries. Honours an
    // explicit '\n' if the data already carries one. Labels at/under `max` chars
    // stay on one line; longer ones split near the middle word break.
    function wrapLabel(text, max) {
      if (text.includes('\n')) return text.split('\n');
      if (text.length <= max) return [text];
      const words = text.split(' ');
      if (words.length === 1) return [text];
      // Find the split point that most evenly balances the two lines.
      let best = 1, bestDiff = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ').length;
        const b = words.slice(i).join(' ').length;
        const diff = Math.abs(a - b);
        if (diff < bestDiff) { bestDiff = diff; best = i; }
      }
      return [words.slice(0, best).join(' '), words.slice(best).join(' ')];
    }

    // Theme colours
    const s = getComputedStyle(document.documentElement);
    const C = {
      src:     s.getPropertyValue('--irpp-red').trim(),
      srcLt:   s.getPropertyValue('--irpp-red-light').trim(),
      tgt:     s.getPropertyValue('--irpp-teal').trim(),
      tgtLt:   s.getPropertyValue('--irpp-teal-light').trim(),
      navy:    s.getPropertyValue('--irpp-navy').trim(),
      sage:    s.getPropertyValue('--irpp-sage').trim(),
      orange:  s.getPropertyValue('--irpp-orange').trim(),
      border:  s.getPropertyValue('--clr-border').trim(),
      grid:    s.getPropertyValue('--clr-gridline').trim(),
      body:    s.getPropertyValue('--clr-body').trim(),
      bodySec: s.getPropertyValue('--clr-body-secondary').trim(),
      bgMuted: s.getPropertyValue('--clr-bg-muted').trim(),
    };

    const COMM_NAMES = {
      '1004': 'St. John\'s, NL',
      '1303': 'Halifax, NS',
      '2411': 'Gaspésie–Îles-de-la-Madeleine, QC',
      '3532': 'Oxford, ON',
      '4701': 'Wood Buffalo, AB',
      '4816': 'Lethbridge, AB',
      'PR61': 'Northwest Territories'
    };

    const uiCommunity = document.getElementById('ui-community');
    const uiSource = document.getElementById('ui-source');
    const uiTarget = document.getElementById('ui-target');

    function populateControls(pairs) {
      if (!uiCommunity || !uiSource || !uiTarget) return;

      const cds = [...new Set(pairs.flatMap(p => p.communities))].sort();
      let tempCd = activeCd;
      uiCommunity.innerHTML = '';
      cds.forEach(cd => {
        const opt = document.createElement('option');
        opt.value = cd;
        opt.textContent = COMM_NAMES[cd] || cd;
        if (cd === tempCd) opt.selected = true;
        uiCommunity.appendChild(opt);
      });

      function updateSources() {
        const cd = uiCommunity.value;
        const cdPairs = pairs.filter(p => p.communities.includes(cd));
        const srcMap = {};
        cdPairs.forEach(p => { srcMap[p.source_noc] = p.source_label; });
        
        uiSource.innerHTML = '';
        let foundActiveSrc = false;
        Object.entries(srcMap).forEach(([noc, label]) => {
          const opt = document.createElement('option');
          opt.value = noc;
          opt.textContent = label;
          if (noc === activeSrc) { opt.selected = true; foundActiveSrc = true; }
          uiSource.appendChild(opt);
        });
        if (!foundActiveSrc && uiSource.options.length > 0) {
          activeSrc = uiSource.options[0].value;
          uiSource.options[0].selected = true;
        }
      }

      function updateTargets() {
        const cd = uiCommunity.value;
        const src = uiSource.value;
        const tgtPairs = pairs.filter(p => p.communities.includes(cd) && p.source_noc === src);
        
        uiTarget.innerHTML = '';
        const optDef = document.createElement('option');
        optDef.value = 'default';
        optDef.textContent = 'Default (Side-by-Side)';
        uiTarget.appendChild(optDef);
        
        let foundActiveTgt = false;
        tgtPairs.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.target_noc;
          opt.textContent = p.target_label;
          if (p.target_noc === activeTgt) { opt.selected = true; foundActiveTgt = true; }
          uiTarget.appendChild(opt);
        });
        if (!foundActiveTgt) {
          activeTgt = 'default';
          uiTarget.value = 'default';
        }
      }

      updateSources();
      updateTargets();

      uiCommunity.onchange = (e) => {
        activeCd = e.target.value;
        updateSources();
        updateTargets();
        renderPanels(pairs);
      };

      uiSource.onchange = (e) => {
        activeSrc = e.target.value;
        updateTargets();
        renderPanels(pairs);
      };

      uiTarget.onchange = (e) => {
        activeTgt = e.target.value;
        renderPanels(pairs);
      };
    }

    function renderPanels(allPairs) {
      const container = document.getElementById('figure-container');
      container.innerHTML = '';

      const compact = window.isCompact && window.isCompact();
      // Type/spacing constants; the desktop column is the approved-PNG state.
      const F = compact
        ? { label: 12, wrap: 15, lineH: 15, twoLineUp: 8, axis: 10, annot: 11.5, annotRca: 11,
            pill: 9, pillChar: 7, pillPad: 12, pillH: 16, pillY1: 24, pillY2: 34,
            note: 12, noteLineH: 15, marginLeft: 138 }
        : { label: 8.5, wrap: 18, lineH: 11, twoLineUp: 6, axis: 7.5, annot: 9.5, annotRca: 9,
            pill: 7, pillChar: 5.5, pillPad: 10, pillH: 13, pillY1: 16, pillY2: 24,
            note: 8.5, noteLineH: 12, marginLeft: 120 };

      let pairs = allPairs.filter(p => p.source_noc === activeSrc && p.communities.includes(activeCd));

      if (activeTgt !== 'default') {
        pairs = pairs.filter(p => p.target_noc === activeTgt);
      } else {
        pairs = pairs.slice(0, compact ? 1 : 2);
      }
      
      if (pairs.length === 0) {
        container.innerHTML = `<div style="padding: 20px; font-family: 'Inter', sans-serif; font-size: 14px; color: #666;">No gap highlighting data found for this pair.</div>`;
        reportSize();
        return;
      }
      
      pairs.forEach((pair, pi) => {
        // Create panel DOM
        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.id = `panel-${pi}`;
        panel.innerHTML = `
          <div class="panel-header" id="header-${pi}">
            <div class="header-col source">
              <div class="header-role">Susceptible</div>
              <div class="header-occ">${pair.source_label || pair.source}</div>
            </div>
            <div class="header-col target">
              <div class="header-role">Viable</div>
              <div class="header-occ">${pair.target_label || pair.target}</div>
            </div>
          </div>
          <div class="chart-area"><svg id="chart-${pi}"></svg></div>
        `;
        container.appendChild(panel);

        // ── Chart sizing ──
        const area = panel.querySelector('.chart-area');
        const W = area.clientWidth || 320;
        const H = area.clientHeight || 340;

        const margin = { top: 12, right: 16, bottom: 44, left: F.marginLeft };
        const w = W - margin.left - margin.right;
        const h = H - margin.top - margin.bottom;

        const svg = d3.select(`#chart-${pi}`)
          .attr('width', W).attr('height', H);

        const g = svg.append('g')
          .attr('transform', `translate(${margin.left},${margin.top})`);

        // Scales
        const maxRCA = d3.max(pair.comps, d => Math.max(d.src, d.tgt)) * 1.12;
        const x = d3.scaleLinear().domain([0, maxRCA]).range([0, w]);
        const y = d3.scaleBand()
          .domain(pair.comps.map(d => d.name))
          .range([0, h])
          .padding(0.42);

        // Cap thickness so pathways with 1–2 competencies don't get giant bars
        // (68 = the 2-row bandwidth, so standard layouts are unaffected)
        const barH = Math.min(y.bandwidth(), 68);
        const bandPad = (y.bandwidth() - barH) / 2;

        // Gridlines
        x.ticks(3).forEach(tick => {
          g.append('line')
            .attr('x1', x(tick)).attr('x2', x(tick))
            .attr('y1', 0).attr('y2', h)
            .attr('stroke', C.grid).attr('stroke-width', 0.5);
        });

        // RCA = 1 line
        g.append('line')
          .attr('x1', x(1)).attr('x2', x(1))
          .attr('y1', -4).attr('y2', h + 4)
          .attr('stroke', C.navy).attr('stroke-width', 1.2)
          .attr('stroke-dasharray', '4,3').attr('opacity', 0.5);

        // ── Bars ──
        pair.comps.forEach(comp => {
          const cy = y(comp.name) + bandPad;

          const barTip = `<div class="tt-title">${comp.name}</div>`
            + `<div class="tt-value"><span style="color:#e77">${pair.source_label}</span> RCA: ${comp.src.toFixed(2)}</div>`
            + `<div class="tt-value"><span style="color:#7cc">${pair.target_label}</span> RCA: ${comp.tgt.toFixed(2)}</div>`
            + `<hr class="tt-divider"><div class="tt-value">${comp.type === 'gap'
              ? `Training gap: the viable occupation relies on this competency above the all-occupation average (RCA > 1) while the susceptible occupation sits below it (gap size ${(comp.tgt - comp.src).toFixed(2)}).`
              : 'Shared strength: both occupations rely on this competency more than the average occupation (RCA > 1).'}</div>`;

          // Back bar — target at low opacity
          const backBar = g.append('rect')
            .attr('x', 0).attr('y', cy)
            .attr('width', Math.max(0, x(comp.tgt))).attr('height', barH)
            .attr('fill', C.tgt).attr('opacity', 0.35)
            .attr('rx', 2);

          // Front bar — source, slightly transparent
          const frontBar = g.append('rect')
            .attr('x', 0).attr('y', cy)
            .attr('width', Math.max(0, x(comp.src))).attr('height', barH)
            .attr('fill', C.src).attr('opacity', 0.50)
            .attr('rx', 2);

          [backBar, frontBar].forEach(sel => tippy(sel.node(), {
            theme: 'irpp', animation: 'shift-away', allowHTML: true,
            placement: 'top', appendTo: document.body, content: barTip,
          }));

          // Y-axis label
          const lines = wrapLabel(comp.name, F.wrap);
          const labelY = cy + barH / 2 - (lines.length > 1 ? F.twoLineUp : 0);

          lines.forEach((line, li) => {
            g.append('text')
              .attr('x', -8).attr('y', labelY + li * F.lineH)
              .attr('dy', '0.35em')
              .attr('text-anchor', 'end')
              .attr('font-size', F.label + 'px')
              .attr('font-weight', '600')
              .attr('fill', C.body)
              .text(line);
          });

          // Pill
          const pillClr = comp.type === 'shared' ? C.sage : C.orange;
          const pillText = comp.type === 'shared' ? 'SHARED' : 'GAP';
          const pillW = pillText.length * F.pillChar + F.pillPad;
          const pillH = F.pillH;
          const pillY = labelY + (lines.length > 1 ? F.pillY2 : F.pillY1);

          const pillTip = comp.type === 'shared'
            ? `<div class="tt-title">SHARED</div><div class="tt-value">Both occupations rely on this competency above the all-occupation average (RCA > 1) — an existing strength the worker carries over.</div>`
            : `<div class="tt-title">GAP</div><div class="tt-value">The viable occupation's RCA exceeds 1 while the susceptible occupation's is below 1 — where targeted training would have the most impact.</div>`;
          const pillRect = g.append('rect')
            .attr('x', -8 - pillW).attr('y', pillY - pillH / 2)
            .attr('width', pillW).attr('height', pillH)
            .attr('fill', pillClr).attr('rx', 2.5);
          tippy(pillRect.node(), {
            theme: 'irpp', animation: 'shift-away', allowHTML: true,
            placement: 'top', appendTo: document.body, content: pillTip,
          });
          g.append('text')
            .attr('x', -8 - pillW / 2).attr('y', pillY)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .attr('font-size', F.pill + 'px').attr('font-weight', '700')
            .attr('fill', '#fff').attr('letter-spacing', '0.6px')
            .text(pillText);
        });

        // No-gap annotation: the paper's gap definition (target RCA > 1,
        // source RCA < 1) can yield zero gaps for near-identical profiles.
        // Sits left-aligned at the axis, in the slot the next bar would take.
        if (!pair.comps.some(c => c.type === 'gap')) {
          const lastBottom = Math.max(...pair.comps.map(c => y(c.name) + bandPad + barH));
          const noteY = Math.min(lastBottom + 30, h - 40);
          const noteLines = [
            'No formal training gaps for this pathway —',
            'the viable occupation relies on competencies',
            'this occupation already uses intensively.',
          ];
          noteLines.forEach((line, li) => {
            g.append('text')
              .attr('x', 4).attr('y', noteY + li * F.noteLineH)
              .attr('text-anchor', 'start')
              .attr('font-size', F.note + 'px')
              .attr('font-style', 'italic')
              .attr('fill', '#999')
              .text(line);
          });
        }

        // X-axis
        const xAxis = g.append('g')
          .attr('transform', `translate(0,${h})`);

        xAxis.call(
          d3.axisBottom(x).ticks(3).tickSize(4)
            .tickFormat(d => d.toFixed(1))
        ).attr('font-size', F.axis + 'px');

        xAxis.select('.domain').attr('stroke', C.border);
        xAxis.selectAll('.tick line').attr('stroke', C.border);

        const annotY = 26;
        g.append('text')
          .attr('x', 0).attr('y', h + annotY)
          .attr('font-size', F.annot + 'px').attr('fill', C.bodySec)
          .attr('font-weight', '600')
          .text('← Less reliance');

        g.append('text')
          .attr('x', w).attr('y', h + annotY)
          .attr('text-anchor', 'end')
          .attr('font-size', F.annot + 'px').attr('fill', C.bodySec)
          .attr('font-weight', '600')
          .text('More reliance →');

        g.append('text')
          .attr('x', w / 2).attr('y', h + annotY + (compact ? 15 : 0))
          .attr('text-anchor', 'middle')
          .attr('font-size', F.annotRca + 'px').attr('fill', C.bodySec)
          .text('RCA');
      });
      
      reportSize();
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      const ctrls = document.querySelector('.iframe-controls');
      let h = document.querySelector('.dev-wrapper').scrollHeight;
      
      if (c) parent.postMessage({ type: 'figure-sized', fig: 'I_skills_gap_bars', width: c.scrollWidth, height: h }, '*');
    }

    function loadAndRender() {
      if (CACHE.PAIRS) {
        populateControls(CACHE.PAIRS);
        renderPanels(CACHE.PAIRS);
        return;
      }
      fetch('../data/I_skills_gap_bars.json')
        .then(r => r.json())
        .then(DATA => {
          CACHE.PAIRS = DATA.pairs;
          populateControls(CACHE.PAIRS);
          renderPanels(CACHE.PAIRS);
        });
    }

    // Listen for set-active-pair
    window.addEventListener('message', e => {
      if (!e.data || e.data.type !== 'set-active-pair') return;
      let needsRender = false;
      if (e.data.cd && e.data.cd !== activeCd) { activeCd = e.data.cd; needsRender = true; }
      if (e.data.src && e.data.src !== activeSrc) { activeSrc = e.data.src; needsRender = true; }
      if (e.data.tgt !== undefined && e.data.tgt !== activeTgt) { activeTgt = e.data.tgt; needsRender = true; }
      
      if (needsRender && CACHE.PAIRS) renderPanels(CACHE.PAIRS);
    });

    window.addEventListener('compactmodechange', () => { if (CACHE.PAIRS) renderPanels(CACHE.PAIRS); });

    loadAndRender();
  </script>

<!-- CTP WP Engine Embed Helper -->
<script>
  if (window.self !== window.top) {
    document.body.classList.add('export-mode');
    window.addEventListener('load', () => {
      setTimeout(() => {
        const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
        const ctrls = document.querySelector('.iframe-controls');
        let h = document.querySelector('.dev-wrapper').scrollHeight;
        
        if (c) {
          const fig = location.pathname.split('/').pop().replace('.html', '');
          parent.postMessage({
            type: 'figure-sized',
            fig: fig,
            width: c.scrollWidth,
            height: h
          }, '*');
        }
      }, 100);
    });
  }
</script>
</body>

</html>
