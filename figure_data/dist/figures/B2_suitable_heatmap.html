<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suitable Heatmap (B2 2-digit NOC)</title>
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../tokens.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      height: auto;
      min-height: 420px;
      padding: 0;
    }

    .heatmap-table {
      border-collapse: collapse;
      font-size: var(--fs-body);
      width: auto;
    }

    .heatmap-table th {
      font-weight: var(--fw-medium);
      color: var(--color-text-secondary);
      padding: 2px 4px;
      text-align: center;
      vertical-align: bottom;
      border-bottom: 1px solid var(--color-border-default);
    }

    .heatmap-table th.col-header {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      height: 160px;
      white-space: normal;
      max-width: 3em;
      font-size: 10.5px;
      padding: var(--sp-6) 2px 0;
      line-height: 1.08;
      text-align: left;
      vertical-align: middle;
    }

    .heatmap-table th.row-header {
      text-align: right;
      padding-right: var(--sp-6);
      font-size: 10px;
      max-width: 175px;
      line-height: 1.3;
      font-weight: var(--fw-medium);
      color: var(--color-text-primary);
      border-bottom: none;
      vertical-align: middle;
    }

    .comm-pills {
      display: block;
      margin-top: 1px;
    }

    body.print-mode .comm-pills {
      display: none;
    }

    .comm-pill {
      display: inline-block;
      font-size: 8px;
      font-weight: var(--fw-semibold);
      letter-spacing: 0.3px;
      padding: 0.5px 3px;
      border-radius: 2px;
      background: var(--color-surface-pill-neutral);
      border: 1px solid var(--color-border-pill-neutral);
      color: var(--color-text-pill-neutral);
      margin-left: 1px;
      line-height: 1.4;
    }

    .heatmap-table td {
      text-align: center;
      padding: 1px 1px;
      min-width: 41px;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      border-bottom: none;
      vertical-align: middle;
    }

    .hm-cell {
      border-radius: 2px;
      display: block;
      margin: 0 auto;
      width: 39px;
      height: 22px;
      line-height: 22px;
      font-size: 9.5px;
      cursor: default;
    }

    .hm-cell:not(.hm-zero) {
      background: color-mix(in oklch, var(--color-scale-heatmap-max) calc(var(--ratio) * 100%), var(--color-scale-heatmap-base));
    }

    .hm-zero {
      background: var(--color-scale-heatmap-zero);
    }

    /* ── COMPACT (<440px iframe width; see compact.js): sticky source column + horizontal
       scroll (dense-grid treatment per 2026-07-08 decisions). ── */
    .compact-scroll-hint {
      display: none;
    }

    html.compact .figure-container {
      width: 100%;
      min-height: 0;
      padding: 10px 0 12px;
    }

    html.compact .dev-wrapper {
      padding: 8px;
    }

    html.compact .compact-scroll-hint {
      display: block;
      font-size: 11px;
      color: var(--color-text-secondary);
      padding: 0 12px 6px;
    }

    html.compact #heatmap-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    html.compact .heatmap-table th.row-header {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--color-surface-default);
      font-size: 12px;
      min-width: 138px;
      max-width: 138px;
      padding-left: 10px;
      box-shadow: 3px 0 4px -2px var(--color-shadow-subtle);
    }

    html.compact .heatmap-table th.col-header {
      font-size: 11px;
      height: 150px;
    }

    /* Community pills dropped in compact (kept row heights near one line);
       cell tooltips still name the member occupations. */
    html.compact .comm-pills {
      display: none;
    }

    html.compact .heatmap-table td {
      min-width: 40px;
    }

    html.compact .hm-cell {
      width: 36px;
      height: 24px;
      line-height: 24px;
      font-size: 12px;
    }

    /* sequential scale classes removed in favor of dynamic color-mix */
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="figure-container">
      <div class="compact-scroll-hint">Swipe sideways for more destination groups →</div>
      <div id="heatmap-container"></div>
    </div>
  </div>

  <script>
    let currentMetric = (new URLSearchParams(location.search).get('metric') === 'euclidean') ? 'euclidean' : 'cosine';
    const isPrint = navigator.webdriver || new URLSearchParams(location.search).has('print');
    if (isPrint) document.body.classList.add('print-mode');
    const CACHE = {};

    function buildHeatmap(cells, sourceComms) {
      // Destroy existing tippy instances to avoid orphans
      document.querySelectorAll('.hm-cell').forEach(el => { if (el._tippy) el._tippy.destroy(); });

      const destCounts = {};
      const srcCounts = {};
      cells.forEach(c => {
        destCounts[c.dest_noc2] = (destCounts[c.dest_noc2] || 0) + c.count;
        srcCounts[c.source_noc] = (srcCounts[c.source_noc] || 0) + c.count;
      });
      // Sort dest categories by their NOC code (ascending)
      let dests = Object.keys(destCounts).sort((a, b) => a.localeCompare(b));
      // Filter out NOC 65 on the render side
      dests = dests.filter(d => d !== '65');
      const sources = Object.keys(srcCounts).sort((a, b) => srcCounts[b] - srcCounts[a]);

      const srcLabels = {};
      const destLabels = {};
      cells.forEach(c => {
        let label = c.source_label;
        if (!isPrint) {
          label = label.split(',')[0];
          if (label.length > 32) label = label.substring(0, 30) + '...';
        } else {
          // Uniformly shorten " and " for print mode to save space
          label = label.replace(/ and /g, ' & ');
          
          // Specific editorial shorthands to prevent 3-line wrapping
          if (c.source_noc === '74203') {
            label = 'Automotive, heavy truck & equipment parts installers';
          }
          if (c.source_noc === '94141') {
            label = 'Industrial butchers, meat cutters & poultry preparers';
          }
        }
        srcLabels[c.source_noc] = label;
        destLabels[c.dest_noc2] = c.dest_label;
      });

      const lookup = {};
      cells.forEach(c => {
        lookup[`${c.source_noc}|${c.dest_noc2}`] = c;
      });

      /* hmClass removed in favor of dynamic inline styles */

      let html = '<table class="heatmap-table">';
      html += '<tr><th></th>';
      dests.forEach(d => {
        html += `<th class="col-header" title="${destLabels[d]}">${destLabels[d]}</th>`;
      });
      html += '</tr>';

      sources.forEach(s => {
        const pills = (sourceComms && sourceComms[s])
          ? '<span class="comm-pills">' + sourceComms[s].map(c =>
            `<span class="comm-pill">${c}</span>`
          ).join('') + '</span>'
          : '';

        html += `<tr><th class="row-header">${srcLabels[s]}${pills}</th>`;
        dests.forEach(d => {
          const cell = lookup[`${s}|${d}`];
          const v = cell ? cell.count : 0;
          if (v === 0) {
            html += `<td><span class="hm-cell hm-zero" data-cell="${s}|${d}"></span></td>`;
          } else {
            const ratio = Math.min(v / 10, 1.0);
            const textColor = (v <= 3) ? 'var(--color-text-primary)' : 'var(--color-text-inverse)';
            html += `<td><span class="hm-cell" style="--ratio: ${ratio}; color: ${textColor};" data-cell="${s}|${d}">`
              + `${v || ''}</span></td>`;
          }
        });
        html += '</tr>';
      });

      html += '</table>';
      document.getElementById('heatmap-container').innerHTML = html;

      // ── Tippy tooltips on non-zero cells: name the actual occupations ──
      document.querySelectorAll('.hm-cell').forEach(el => {
        const cell = lookup[el.dataset.cell];
        if (!cell || cell.count === 0) return;
        const members = (cell.members || []).map(m =>
          `<div class="tt-value">${m.label} <span style="opacity:0.65">· ${m.sim.toFixed(3)}</span></div>`).join('');

        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${cell.dest_label}</div>`
            + `<div class="tt-value">${cell.count} of the top-10 skills matches for <strong>${cell.source_label}</strong>:</div>`
            + members
            + (cell.avg_sim ? `<hr class="tt-divider"><div class="tt-value">Avg. similarity: ${cell.avg_sim.toFixed(3)}</div>` : ''),
          allowHTML: true,
          placement: 'top',
        });
      });

      reportSize();
    }

    function loadAndRender(metric) {
      if (CACHE[metric]) { buildHeatmap(CACHE[metric].heatmap, CACHE[metric].source_communities); return; }
      fetch(`../data/B2_suitable_heatmap.${metric}.json`)
        .then(r => r.json())
        .then(DATA => { CACHE[metric] = DATA; buildHeatmap(DATA.heatmap, DATA.source_communities); });
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      if (c) parent.postMessage({ type: 'figure-sized', fig: 'B2_suitable_heatmap', width: c.scrollWidth, height: document.querySelector('.dev-wrapper').scrollHeight }, '*');
    }

    // Listen for in-place metric switch from parent
    window.addEventListener('message', e => {
      if (!e.data || e.data.type !== 'set-metric' || !e.data.metric) return;
      if (e.data.metric === currentMetric) return;
      currentMetric = e.data.metric;
      loadAndRender(currentMetric);
    });

    loadAndRender(currentMetric);
  </script>

  <!-- CTP WP Engine Embed Helper -->
  <script>
    if (window.self !== window.top) {
      document.body.classList.add('export-mode');
      window.addEventListener('load', () => {
        setTimeout(() => {
          const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
          if (c) {
            const fig = location.pathname.split('/').pop().replace('.html', '');
            parent.postMessage({
              type: 'figure-sized',
              fig: fig,
              width: c.scrollWidth,
              height: document.querySelector('.dev-wrapper').scrollHeight
            }, '*');
          }
        }, 100);
      });
    }
  </script>
</body>

</html>
