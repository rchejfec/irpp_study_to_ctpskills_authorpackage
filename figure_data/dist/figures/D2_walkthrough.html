<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walkthrough Figure D2 — Oxford, ON</title>
  <link rel="stylesheet" href="../theme.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      /* Baseline height; grows if a pair's assessment notes run longer
         (iframe hosts resize via the figure-sized postMessage). */
      min-height: var(--fig-height);
      height: auto;
      padding: 0;
      display: flex;
      /* D2: full-width source band stacked above the 3-column body */
      flex-direction: column;
      overflow: hidden;
    }

    /* ── D2: full-width source band ── */
    .source-band {
      background: #faf6f0;
      border-bottom: 1px solid #e0ddd6;
      padding: 6px 12px;
      flex-shrink: 0;
    }

    .band-headline {
      line-height: 1.35;
      margin-bottom: 2px;
      font-size: 11px;
      color: #444;
    }

    /* *** occupation name — largest */
    .em3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--irpp-navy);
    }

    /* ** community — medium (matches base headline size) */
    .em2 {
      font-weight: 700;
    }

    .band-subline {
      font-size: 9px;
      color: #888;
      line-height: 1.3;
    }

    /* * sector — bold only at base size */
    .em1 {
      font-weight: 700;
      color: #555;
    }

    /* D2: one grid for all three columns so the row-1 explainer panels align
       exactly. The two wrapper divs stay for the compact branch, but on
       desktop their children participate in this grid directly. */
    .fig-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .cols-left {
      display: contents;
    }

    .col-right {
      display: contents;
    }

    /* Rail (col 3, row 2): skill-gap preview on top, assessment notes below */
    .rail-stack {
      grid-column: 3;
      grid-row: 2;
      border-left: 1px solid var(--clr-border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .rail-stack>.cell-rca {
      flex: 0 0 auto;
      border-bottom: 1px solid var(--clr-border);
    }

    .rail-stack>.cell-qual {
      flex: 1 0 auto;
    }

    /* was 7px — bumped to 6pt decorative floor */
    .src-comm {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .src-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--irpp-navy);
      line-height: 1.3;
      margin-bottom: 4px;
    }

    /* was 8px — bumped to ~7pt content floor */
    .src-detail {
      font-size: 9.5px;
      color: #999;
      line-height: 1.6;
    }

    .src-detail span {
      color: #444;
      font-weight: 500;
    }

    /* ── R2C1: Similarity bars ── */
    .cell-similar {
      grid-column: 1;
      grid-row: 2;
      border-right: 1px solid var(--clr-border);
      padding: 2px 8px 4px 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sim-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sim-row {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* was 8px — bumped toward 7pt content floor */
    .sim-rank {
      width: 14px;
      font-size: 9px;
      color: #999;
      text-align: right;
      font-weight: 600;
      flex-shrink: 0;
      margin-right: 2px;
    }

    .sim-bar-wrap {
      flex: 1;
      height: 80%;
      position: relative;
      min-width: 0;
    }

    .sim-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--irpp-navy-light);
      position: absolute;
      left: 0;
      top: 0;
    }

    /* was 8px — bumped to ~7pt content floor */
    .sim-label {
      font-size: 9.5px;
      color: var(--clr-body);
      height: 100%;
      display: flex;
      align-items: center;
      padding-left: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    /* ── D2 row 1: explainer panels (serve as the column headers) ── */
    .cell-explain {
      border-bottom: 1px solid var(--clr-border);
      padding: 7px 10px 6px;
      background: #fafaf8;
    }

    .cell-explain.c1 {
      grid-column: 1;
      grid-row: 1;
      border-right: 1px solid var(--clr-border);
    }

    .cell-explain.c2 {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
      /* hm-header supplies its own bottom padding */
    }

    .cell-explain.c3 {
      grid-column: 3;
      grid-row: 1;
      border-left: 1px solid var(--clr-border);
    }

    .exp-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--irpp-navy);
      font-weight: 700;
      margin-bottom: 3px;
    }

    .exp-body {
      font-size: 9px;
      color: #666;
      line-height: 1.45;
    }

    .exp-legend {
      font-size: 8px;
      color: #aaa;
      white-space: nowrap;
      margin-left: 4px;
    }

    .exp-legend .hm-dot {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 1px;
    }

    /* Heatmap column headers pushed to bottom of explainer panel;
       the panel's border-bottom acts as the implicit separator.
       Negative side margins compensate for the explainer's 10px padding
       vs the data grid's 4px, keeping the 5 columns pixel-aligned. */
    .cell-explain .hm-header {
      margin: 4px -6px 0;
      border-bottom: none;
    }

    /* ── R2C2: Viability heatmap ── */
    .cell-filtered {
      grid-column: 2;
      grid-row: 2;
      padding: 0 4px 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hm-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hm-header {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      height: 14px;
      flex-shrink: 0;
      border-bottom: 1px solid #ddd;
    }

    /* was 6.5px — bumped to 6pt decorative floor */
    .hm-h-col {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #999;
      font-weight: 600;
      text-align: center;
    }

    .hm-data-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hm-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      flex: 1;
      min-height: 0;
      border-bottom: 1px solid #f2f2f2;
    }

    .hm-row:last-child {
      border-bottom: none;
    }

    .hm-row.hm-pass {
      background: #f0faf2;
    }

    .hm-dot {
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .hm-dot svg {
      width: 13px;
      height: 13px;
    }

    .exp-legend .hm-dot svg {
      width: 10px;
      height: 10px;
    }

    .hm-ok svg {
      stroke: #27ae60;
    }

    .hm-fail svg {
      stroke: #e74c3c;
    }

    .hm-warn svg {
      stroke: #f39c12;
    }

    /* ── R1C3: Skill gap preview ── */
    .cell-rca {
      padding: 8px 10px 6px;
      background: #fff;
      overflow: hidden;
    }

    /* was 7px — bumped to 6pt decorative floor */
    .rca-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--irpp-navy);
      font-weight: 700;
      margin-bottom: 3px;
    }

    /* was 9px — bumped to ~7pt content floor */
    .rca-pair {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--clr-body);
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .rca-pair .from {
      color: var(--irpp-red);
      font-weight: 700;
      text-align: left;
      padding-left: 10px;
    }

    .rca-pair .rca-arrow {
      color: #999;
      text-align: center;
      padding: 0 10px;
    }

    .rca-pair .to {
      color: var(--irpp-teal);
      font-weight: 700;
      text-align: left;
      padding-left: 10px;

    }

    /* was 8px — bumped toward 7pt content floor (secondary text) */
    .rca-hint {
      font-size: 9px;
      color: #aaa;
      line-height: 1.3;
      margin-bottom: 2px;
      text-align: center;
    }

    .rca-bars {
      margin-top: 5px;
      padding: 0 6px;
    }

    .rca-bar-row {
      margin-bottom: 5px;
    }

    /* was 7.5px — bumped toward 7pt content floor */
    .rca-bar-label {
      font-size: 9px;
      color: #666;
      margin-bottom: 1px;
      line-height: 1.15;
    }

    .rca-plot {
      position: relative;
    }

    .rca-ref {
      position: absolute;
      top: -1px;
      bottom: -1px;
      width: 0;
      border-left: 1.5px solid #aaa;
      z-index: 2;
    }

    .rca-bar {
      height: 5px;
      border-radius: 1px;
      margin-bottom: 1px;
      min-width: 1px;
    }

    .rca-bar.src {
      background: var(--irpp-red);
    }

    .rca-bar.tgt {
      background: var(--irpp-teal);
    }

    /* ── R2C3: Assessment notes ── */
    .cell-qual {
      padding: 6px 10px 4px;
      background: #faf9f7;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* was 7px — bumped to 6pt decorative floor */
    .qual-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--irpp-navy);
      font-weight: 700;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .qual-item {
      margin-bottom: 3px;
      padding-left: 6px;
      border-left: 2px solid #ddd;
      flex-shrink: 0;
    }

    .qual-item.up {
      border-left-color: #27ae60;
    }

    .qual-item.down {
      border-left-color: #e74c3c;
    }

    /* was 8px — bumped to ~7pt content floor */
    .qual-occ {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--clr-body);
    }

    /* was 7.5px — bumped toward 7pt content floor (secondary text) */
    .qual-explain {
      font-size: 9px;
      color: #888;
      line-height: 1.35;
      margin-top: 1px;
    }

    /* was 7px — bumped with note titles */
    .qual-arrow {
      font-size: 8px;
      margin-right: 2px;
    }

    .qual-arrow.up {
      color: #27ae60;
    }

    .qual-arrow.down {
      color: #e74c3c;
    }

    .qual-callout {
      margin-top: auto;
      padding: 5px 8px;
      background: var(--clr-bg-muted);
      border-radius: 3px;
      border-left: 3px solid var(--irpp-navy);
    }

    /* was 7.5px — bumped toward 7pt content floor */
    .qual-callout p {
      font-size: 9px;
      color: #444;
      line-height: 1.5;
      font-style: italic;
      margin: 0;
    }

    .tt-trigger {
      text-decoration: underline dotted #27ae60;
      font-weight: 600;
      cursor: pointer;
      color: inherit;
    }

    .tt-trigger:hover {
      color: #219653;
    }

    .occ-title-tt {
      text-decoration: underline dotted #888;
      cursor: help;
    }

    .tt-comm-box {
      padding: 4px;
    }

    /* tooltip text: was 8.5/7.5/7.5px — bumped with content floors */
    .tt-comm-title {
      font-weight: 700;
      font-size: 9.5px;
      margin-bottom: 4px;
      color: var(--irpp-navy);
    }

    .tt-comm-text {
      color: #444;
      font-size: 9px;
      line-height: 1.4;
    }

    .tt-divider {
      margin: 6px 0;
      border: 0;
      border-top: 1px solid #e5e7eb;
    }

    .tt-value-small {
      font-size: 9px;
    }

    /* ── COMPACT (<640px iframe width) — lossy per 2026-07-08 decisions:
       stacked single column; similarity bars and the 5-screen dot matrix
       merge into one candidate list (top 7); assessment notes trimmed to
       the callout + 2 items. Desktop 3-column layout untouched. ── */
    html.compact .figure-container {
      width: 100%;
      min-height: 0;
      display: block;
    }

    html.compact .source-band {
      display: none;
    }

    html.compact .fig-body {
      display: block;
    }

    html.compact .dev-wrapper {
      padding: 8px;
    }

    html.compact .col-right {
      display: none;
    }

    html.compact .cols-left {
      display: block;
    }

    html.compact .cw-source {
      background: #faf6f0;
      border-bottom: 1px solid #e0ddd6;
      padding: 10px 12px;
    }

    html.compact .cw-comm {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      font-weight: 600;
    }

    html.compact .cw-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--irpp-navy);
      line-height: 1.3;
      margin: 2px 0 4px;
    }

    html.compact .cw-detail {
      font-size: 12px;
      color: #777;
      line-height: 1.55;
    }

    html.compact .cw-detail span {
      color: #333;
      font-weight: 600;
    }

    html.compact .cw-sec-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--irpp-navy);
      font-weight: 700;
      padding: 12px 12px 2px;
    }

    html.compact .cw-legend {
      font-size: 11px;
      color: #999;
      padding: 0 12px 6px;
      line-height: 1.4;
    }

    html.compact .cw-headrow {
      display: grid;
      grid-template-columns: 1fr repeat(5, 32px);
      align-items: end;
      padding: 0 12px 3px;
      border-bottom: 1px solid #ddd;
    }

    html.compact .cw-h-screen {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      color: #888;
      text-align: center;
      text-decoration: underline dotted;
      text-underline-offset: 2px;
    }

    html.compact .cw-row {
      display: grid;
      grid-template-columns: 1fr repeat(5, 32px);
      align-items: center;
      padding: 2px 12px;
      border-bottom: 1px solid #f2f2f2;
    }

    html.compact .cw-row.cw-pass {
      background: #f0faf2;
    }

    html.compact .cw-cand {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding-right: 6px;
    }

    html.compact .cw-rank {
      font-size: 11px;
      color: #999;
      font-weight: 600;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    html.compact .cw-barwrap {
      position: relative;
      flex: 1;
      height: 24px;
      min-width: 0;
    }

    html.compact .cw-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--irpp-navy-light);
      border-radius: 2px;
    }

    html.compact .cw-label {
      position: relative;
      z-index: 1;
      font-size: 12px;
      line-height: 24px;
      padding-left: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    html.compact .cw-dot {
      text-align: center;
      font-size: 13px;
    }

    html.compact .cw-more {
      font-size: 11.5px;
      color: #999;
      font-style: italic;
      padding: 6px 12px 2px;
    }

    /* Reused desktop cells, scaled to the 12px floor */
    html.compact .cell-rca {
      border-bottom: 1px solid var(--clr-border);
      padding: 12px;
      overflow: visible;
    }

    html.compact .rca-title {
      font-size: 12px;
    }

    html.compact .rca-pair {
      font-size: 13px;
      margin-bottom: 4px;
    }

    html.compact .rca-hint {
      font-size: 11.5px;
    }

    html.compact .rca-bar-label {
      font-size: 11.5px;
      margin-bottom: 2px;
    }

    html.compact .rca-bar {
      height: 7px;
    }

    html.compact .rca-bar-row {
      margin-bottom: 8px;
    }

    html.compact .cell-qual {
      padding: 12px;
      overflow: visible;
    }

    html.compact .qual-title {
      font-size: 12px;
    }

    html.compact .qual-item {
      margin-bottom: 6px;
      padding-left: 8px;
    }

    html.compact .qual-occ {
      font-size: 12.5px;
    }

    html.compact .qual-explain {
      font-size: 11.5px;
    }

    html.compact .qual-arrow {
      font-size: 11px;
    }

    html.compact .qual-callout {
      margin-top: 8px;
    }

    html.compact .qual-callout p {
      font-size: 11.5px;
    }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="iframe-controls">
      <div class="control-group">
        <label>Community</label>
        <select id="ui-community"></select>
      </div>
      <div class="control-group">
        <label>Source</label>
        <select id="ui-source"></select>
      </div>
    </div>
    <div class="figure-container">
      <div class="source-band" id="grid-band"></div>
      <div class="fig-body">
        <div class="cols-left" id="grid-left"></div>
        <div class="col-right" id="grid-right"></div>
      </div>
    </div>
  </div>

  <script>
    let currentMetric = (new URLSearchParams(location.search).get('metric') === 'euclidean') ? 'euclidean' : 'cosine';
    const CACHE = {};

    // Screen definitions (shared by the desktop heatmap headers and the
    // compact merged candidate list).
    const hmDefs = {
      Pool: 'Provincial labour pool — candidate occupation has reported workers in this province (2021 Census).',
      TEER: 'Training alignment — candidate TEER within the accepted window around the source occupation’s (comparable, or more extensive training).',
      Earn: 'Earnings differential — provincial median income ≥ 65% of the source occupation\'s. Amber = passes but below parity.',
      COPS: 'Occupational outlook — federal COPS projections; fails on projected labour surplus.',
      'A.I.': 'AI exposure — Dais (2025) ratings; high exposure excluded.',
      'Qual.': 'Qualitative community review — curated pick (green), susceptible-sector exclusion (red), or no local presence (amber). Approximated from IRPP community profiles.',
    };

    // Tooltip wiring shared by both render modes.
    function attachTips() {
      if (typeof tippy === 'undefined') return;
      document.querySelectorAll('[data-tt-label]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${el.dataset.ttLabel}</div>`
            + `<div class="tt-value">Similarity: ${el.dataset.ttSim}</div>`
            + `<div class="tt-value">TEER: ${el.dataset.ttTeer}</div>`,
          allowHTML: true,
          placement: 'right',
          appendTo: document.body,
        });
      });

      // Screening headers + RCA preview rows: "title|body" data-tips.
      document.querySelectorAll('[data-tip]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const [tipTitle, tipBody] = el.dataset.tip.split('|');
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${tipTitle}</div><div class="tt-value">${tipBody}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Dynamic community review tooltips
      document.querySelectorAll('.tt-trigger').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const cd = el.getAttribute('data-tt-cd');
        const ratHtml = el.getAttribute('data-tt-rat') || '';
        const basePara = COMMUNITY_TOOLTIPS[cd] || 'Local community profile context.';

        let content = `<div class="tt-comm-box">`;
        content += `<div class="tt-comm-title">Simulated Community Review</div>`;
        content += `<div class="tt-comm-text">${basePara}</div>`;
        if (ratHtml) {
          content += ratHtml;
        }
        content += `</div>`;

        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: content,
          allowHTML: true,
          interactive: true,
          trigger: 'click mouseenter',
          appendTo: document.body,
        });
      });

      // Occupation title tooltips
      document.querySelectorAll('.occ-title-tt').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Screen dot tooltips
      document.querySelectorAll('.screen-dot').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });
    }

    function getDotTooltip(col, c, t) {
      const parts = [];

      const sl = t.source_lmi || {};
      const srcInc = sl.pr_income || 0;

      if (col === 'teer') {
        const delta = c.teer - t.source_teer;
        let deltaText = '';
        if (delta === 0) {
          deltaText = 'same level of educational requirements';
        } else if (delta > 0) {
          deltaText = `${delta} level(s) less of educational requirements`;
        } else {
          deltaText = `${Math.abs(delta)} level(s) more of educational requirements`;

      } else if (col === 'wages') {
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;

        const rel = wRatio >= 1.0 ? 'higher' : 'lower';
        const incomeStr = c.pr_income != null ? '$' + Math.round(c.pr_income).toLocaleString() : '—';
        if (srcInc > 0) {
          parts.push(`<strong>Income:</strong> ${incomeStr} (${pct}% ${rel} than source)`);

          parts.push(`<strong>Income:</strong> ${incomeStr}`);
        }
      } else if (col === 'cops') {
        parts.push(`<strong>COPS outlook:</strong> ${c.cops || 'Unknown'}`);
      } else if (col === 'ai') {
        parts.push(`<strong>AI exposure:</strong> ${c.ai || 'Unknown'}`);
      } else if (col === 'qual') {
        const reasons = [];
        if (c.screen_local_presence === false) {
          reasons.push('No local workers');

        if (c.screen_susceptible === false) {
          reasons.push('Lack of alignment with simulated community review');
        }
        if (reasons.length === 0) {
          reasons.push('Passed qualitative review');

    const COMMUNITY_TOOLTIPS = {

    // ── COMPACT render branch (same data, stacked, lossy) ──
    function buildCompactWalkthrough(t) {
      const cands = t.candidates.slice(0, 7);

    function formatNoteTitle(labels, arrow, type) {
      if (!labels || labels.length === 0) return '';
      let titleText = '';
      if (labels.length <= 3) {
        if (labels.length === 1) {
          titleText = labels[0].text;
        } else if (labels.length === 2) {
          titleText = `${labels[0].text} and ${labels[1].text}`;
        } else {
          titleText = `${labels[0].text}, ${labels[1].text}, and ${labels[2].text}`;
        }
      } else {
        titleText = `${labels[0].text}, ${labels[1].text}, and ${labels.length - 2} more`;
      }
      const tipParts = labels.map(lbl => {
        return `<strong>NOC ${lbl.noc}:</strong> ${lbl.full_title} <span style="opacity: 0.8; font-style: italic;">(#${lbl.rank})</span>`;
      });
      const tipContent = tipParts.join('<span style="margin: 0 6px; opacity: 0.5;">·</span>');
      return `<span class="occ-title-tt" data-tippy-content="${tipContent.replace(/"/g, '&quot;')}"><span class="qual-arrow ${type}">${arrow}</span> ${titleText}</span>`;
    }

    function buildWalkthrough(t) {
      if (window.isCompact && window.isCompact()) { buildCompactWalkthrough(t); return; }
      const cands = t.candidates;
      const sl = t.source_lmi || {};
      const maxSim = Math.max(...cands.map(c => c.similarity));
      const barW = sim => ((sim - 0.70) / (maxSim - 0.70)) * 100;

      function fmt$(v) { return v != null ? '$' + Math.round(v).toLocaleString() : '\u2014'; }
      function fmtW(v) { return v != null ? Math.round(v).toLocaleString() : '\u2014'; }
      function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }
      function smartTrunc(s, n) {
        if (s.length <= n) return s;
        const cut = s.lastIndexOf(' ', n);
        return (cut > 0 ? s.slice(0, cut) : s.slice(0, n)) + '\u2026';
      }

      // Derive viability signals
      const srcInc = sl.pr_income || 0;
      function deriveFilters(c) {
        const delta = c.teer - t.source_teer;
        const teer = (c.teer < 2 || delta < -2 || delta > 1) ? 'red' : (delta < 0 ? 'yellow' : 'green');
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const wages = wRatio >= 1.0 ? 'green'
          : wRatio >= 0.65 ? 'yellow' : 'red';
        const copsRaw = (c.cops || '').toLowerCase();
        const cops = copsRaw.includes('surplus') ? 'red' : 'green';
        const aiRaw = (c.ai || '').toLowerCase();
        const ai = aiRaw.includes('high') ? 'red' : 'green';
        const qual = c.qual_signal || 'green';
        const prov = (c.pr_workers != null && c.pr_workers > 0) ? 'green' : 'red';
        return { prov, teer, wages, cops, ai, qual };
      }

      const svgCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;
      const svgWarn = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`;
      const svgCross = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`;
      function sigDot(signal, tooltipText) {

      let left = '';

      const provAbbr = provMap[cdStr.slice(0, 2)] || '';
      const incomeK = sl.pr_income ? Math.round(sl.pr_income / 1000) + 'k' : null;

      // ═══ Source band (full width) ═══
      document.getElementById('grid-band').innerHTML = `
        <div class="band-headline"><span class="em3">${t.source_label}</span> in <span class="em2">${t.community}</span></div>

      // ═══ Row 1: explainer panels (double as column headers) ═══
      left += `<div class="cell-explain c1">
      <div class="exp-title">Skill-similar</div>
      <div class="exp-body">Candidates ranked by similarity of competency profiles — 166 OaSIS competencies spanning skills, knowledge, abilities, and work context.</div>
    </div>`;
      left += `<div class="cell-explain c2">

      <div class="hm-header">` + Object.keys(hmDefs).map(k =>
        `<div class="hm-h-col" data-tip="${k === 'Qual.' ? 'Qual' : k}|${hmDefs[k].replace(/"/g, '&quot;')}">${k}</div>`).join('') + `</div>

      left += `</div></div></div>`;

      right += `<div class="cell-explain c3">

    </div>`;

      // ═══ Col 3, row 2: rail — skill gaps on top, assessment notes below
      //     (caveat callout omitted in D2) ═══
      right += `<div class="rail-stack">`;
      const fg = t.featured_gap;
      right += `<div class="cell-rca">`;
      if (fg && fg.bars && fg.bars.length > 0) {
        const srcLabel = smartTrunc(t.source_label, 30);
        const tgtLabel = smartTrunc(fg.target_label, 30);

        const tgtTip = fg.target_label.length > 30 ? ` class="to occ-title-tt" data-tippy-content="${fg.target_label.replace(/"/g, '&quot;')}"` : ' class="to"';

      document.getElementById('grid-left').innerHTML = left;
      document.getElementById('grid-right').innerHTML = right;

      attachTips();
      reportSize();
    }

    let activeCd = '3532';
    let activeSrc = '75101';

    const uiCommunity = document.getElementById('ui-community');
    const uiSource = document.getElementById('ui-source');

    function populateControls(FULL_DATA) {
      if (!uiCommunity || !uiSource) return;

      let tempCd = activeCd;
      uiCommunity.innerHTML = '';
      for (const cd in FULL_DATA) {
        const firstSrc = Object.keys(FULL_DATA[cd])[0];
        const opt = document.createElement('option');
        opt.value = cd;
        opt.textContent = FULL_DATA[cd][firstSrc].community;
        if (cd === tempCd) opt.selected = true;
        uiCommunity.appendChild(opt);
      }

      function updateSources() {
        uiSource.innerHTML = '';
        const cd = uiCommunity.value;
        const sources = FULL_DATA[cd];
        let foundActive = false;
        for (const src in sources) {
          const opt = document.createElement('option');
          opt.value = src;
          opt.textContent = sources[src].source_label;
          if (src === activeSrc) {
            opt.selected = true;
            foundActive = true;
          }
          uiSource.appendChild(opt);
        }
        if (!foundActive && uiSource.options.length > 0) {
          activeSrc = uiSource.options[0].value;
          uiSource.options[0].selected = true;
        }
      }

      updateSources();

      uiCommunity.onchange = (e) => {
        activeCd = e.target.value;
        updateSources();
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };

      uiSource.onchange = (e) => {
        activeSrc = e.target.value;
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };
    }

    function loadAndRender(metric) {
      if (CACHE[metric]) {
        populateControls(CACHE[metric]);
        buildWalkthrough(CACHE[metric][activeCd][activeSrc]);
        return;
      }
      fetch(`../data/D_walkthrough.all.${metric}.json`)
        .then(r => r.json())
        .then(DATA => {
          CACHE[metric] = DATA;
          populateControls(DATA);
          buildWalkthrough(DATA[activeCd][activeSrc]);
        });
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      const ctrls = document.querySelector('.iframe-controls');
      let h = document.querySelector('.dev-wrapper').scrollHeight;

      if (c) parent.postMessage({ type: 'figure-sized', fig: 'D2_walkthrough', width: c.scrollWidth, height: h }, '*');
    }

    // Listen for in-place metric switch or active pair switch from parent
    window.addEventListener('message', e => {
      if (!e.data) return;
      let needsRender = false;

      if (e.data.type === 'set-metric' && e.data.metric && e.data.metric !== currentMetric) {
        currentMetric = e.data.metric;
        needsRender = true;
      }

      if (e.data.type === 'set-active-pair') {
        if (e.data.cd && e.data.cd !== activeCd) { activeCd = e.data.cd; needsRender = true; }
        if (e.data.src && e.data.src !== activeSrc) { activeSrc = e.data.src; needsRender = true; }
      }

      if (needsRender) loadAndRender(currentMetric);
    });

    window.addEventListener('compactmodechange', () => loadAndRender(currentMetric));

    loadAndRender(currentMetric);
  </script>

  <!-- CTP WP Engine Embed Helper -->
  <script>
    if (window.self !== window.top) {
      document.body.classList.add('export-mode');
      window.addEventListener('load', () => {
        setTimeout(() => {
          const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
          const ctrls = document.querySelector('.iframe-controls');
          let h = document.querySelector('.dev-wrapper').scrollHeight;

          if (c) {
            const fig = location.pathname.split('/').pop().replace('.html', '');
            parent.postMessage({
              type: 'figure-sized',
              fig: fig,
              width: c.scrollWidth,
              height: h
            }, '*');
          }
        }, 100);
      });
    }
  </script>
