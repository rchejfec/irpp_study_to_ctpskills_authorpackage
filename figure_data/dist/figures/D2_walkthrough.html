<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walkthrough Figure D2 — Oxford, ON</title>
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../tokens.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      /* Baseline height; grows if a pair's assessment notes run longer
         (iframe hosts resize via the figure-sized postMessage). */
      min-height: var(--fig-height);
      height: auto;
      padding: 0;
      display: flex;
      /* D2: full-width source band stacked above the 3-column body */
      flex-direction: column;
      overflow: hidden;
    }

    /* ── D2: full-width source band ──
       Horizontal padding matches .cell-explain (10px) so the band shares
       the figure's left/right text anchors with cols 1 and 3. */
    .source-band {
      background: var(--color-surface-subtle);
      border-bottom: 1px solid var(--color-border-subtle);
      padding: 6px 10px;
      flex-shrink: 0;
      position: relative;
    }

    .band-headline {
      line-height: 1.35;
      margin-bottom: 2px;
      font-size: 11px;
      color: var(--color-text-primary);
    }

    /* *** occupation name — largest */
    .em3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text-brand);
    }

    /* ** community — medium (matches base headline size) */
    .em2 {
      font-weight: 700;
    }

    .band-subline {
      font-size: 9px;
      color: var(--color-text-tertiary);
      line-height: 1.3;
    }

    /* * sector — bold only at base size */
    .em1 {
      font-weight: 700;
      color: var(--color-text-secondary);
    }

    /* D2: one grid for all three columns so the row-1 explainer panels align
       exactly. The two wrapper divs stay for the compact branch, but on
       desktop their children participate in this grid directly. */
    .fig-body {
      flex: 1;
      display: grid;
      /* minmax(0,1fr), not bare 1fr: 1fr implies min-width auto, which lets
         any unbreakable content (e.g. a long nowrap gap pill) widen its
         column and silently shrink the others (legend wrap in col 2).
         Thirds are non-negotiable; content must wrap or truncate inside. */
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .cols-left {
      display: contents;
    }

    .col-right {
      display: contents;
    }

    /* Rail (col 3, row 2): skill-gap preview on top, assessment notes below */
    .rail-stack {
      grid-column: 3;
      grid-row: 2;
      border-left: 1px solid var(--color-border-default);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .rail-stack>.cell-rca {
      flex: 0 0 auto;
    }

    /* Notes take only their natural height, pinned to the rail bottom —
       slack space collects between the two components. The 3|4 divider
       travels with the notes' top edge. */
    .rail-stack>.cell-qual {
      flex: 0 0 auto;
      margin-top: auto;
      border-top: 1px solid var(--color-border-default);
    }

    /* ── R2C1: Similarity bars ── */
    .cell-similar {
      grid-column: 1;
      grid-row: 2;
      border-right: 1px solid var(--color-border-default);
      padding: 2px 8px 4px 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sim-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sim-row {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* was 8px — bumped toward 7pt content floor */
    .sim-rank {
      width: 14px;
      font-size: 9px;
      color: var(--color-text-tertiary);
      text-align: right;
      font-weight: 600;
      flex-shrink: 0;
      margin-right: 2px;
    }

    .sim-bar-wrap {
      flex: 1;
      height: 80%;
      position: relative;
      min-width: 0;
    }

    .sim-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--color-chart-similarity);
      position: absolute;
      left: 0;
      top: 0;
    }

    /* was 8px — bumped to ~7pt content floor */
    .sim-label {
      font-size: 9.5px;
      color: var(--color-text-primary);
      height: 100%;
      display: flex;
      align-items: center;
      padding-left: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    /* ── D2 row 1: explainer panels (serve as the column headers) ──
       No border-bottom: the figure reads as four vertical components
       (similar / similar→viable / skill gaps / notes), not two rows —
       each explainer flows into its data panel. */
    .cell-explain {
      padding: 7px 10px 6px;
      background: var(--color-surface-subtle);
      position: relative;
    }

    .cell-explain.c1 {
      grid-column: 1;
      grid-row: 1;
      border-right: 1px solid var(--color-border-default);
    }

    .cell-explain.c2 {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
      /* hm-header supplies its own bottom padding */
    }

    .cell-explain.c3 {
      grid-column: 3;
      grid-row: 1;
      border-left: 1px solid var(--color-border-default);
    }

    .exp-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-brand);
      font-weight: 700;
      margin-bottom: 3px;
    }

    /* Step chips: numbered circles top-right of each panel (band = 1, then
       2/3/4 walk C2's Identify→Match→Filter→Gaps). Pure CSS rather than SVG
       text: flex centering is deterministic, and the 1.2px border matches
       lucide's stroke weight at this size. Absolute so it works inside the
       c2 flex column too. */
    .exp-step {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 14px;
      height: 14px;
      border: 1.2px solid currentColor;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 600;
      line-height: 1;
      color: var(--color-text-brand);
      opacity: 0.55;
    }

    /* right inherits 8px so chip 1 shares chip 4's right anchor;
       only the vertical offset differs (taller band, optical centering) */
    .source-band .exp-step {
      top: 8px;
    }

    .exp-body {
      font-size: 9px;
      color: var(--color-text-secondary);
      line-height: 1.45;
    }

    .exp-legend {
      font-size: 8px;
      color: var(--color-text-tertiary);
      white-space: nowrap;
      margin-left: 4px;
    }

    .exp-legend .hm-dot {
      display: inline-flex;
      vertical-align: middle;
      margin: 0 1px;
    }

    /* Heatmap column headers pushed to bottom of explainer panel.
       Keeps its own underline (matrix furniture, like an axis) now that
       the explainer row no longer draws a border-bottom.
       Negative side margins compensate for the explainer's 10px padding
       vs the data grid's 4px, keeping the 5 columns pixel-aligned. */
    .cell-explain .hm-header {
      margin: 4px -6px 0;
    }

    /* ── R2C2: Viability heatmap ── */
    .cell-filtered {
      grid-column: 2;
      grid-row: 2;
      padding: 2px 4px 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .hm-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* no underline: the caps/grey typography vs the colored icons below is
       the header signal — keeps col 2 free of horizontal rules like col 1 */
    .hm-header {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      height: 14px;
      flex-shrink: 0;
    }

    /* was 6.5px — bumped to 6pt decorative floor */
    .hm-h-col {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--color-text-tertiary);
      font-weight: 600;
      text-align: center;
    }

    .hm-data-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .hm-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      flex: 1;
      min-height: 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .hm-row:last-child {
      border-bottom: none;
    }

    /* Attrition, shown where it happens: rows out of the running (failed a
       screen and not rescued by review) fade in panel B only. Panel A never
       knows the future; col 3 already contains only survivors. Survivors are
       unmarked — persistence at full strength IS the pass signal (no tint). */
    .hm-row.hm-out {
      opacity: 0.45;
    }

    .hm-dot {
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .hm-dot svg {
      width: 13px;
      height: 13px;
    }

    .exp-legend .hm-dot svg {
      width: 10px;
      height: 10px;
    }

    .hm-ok svg {
      stroke: var(--color-status-success);
    }

    .hm-fail svg {
      stroke: var(--color-status-fail);
    }

    .hm-warn svg {
      stroke: var(--color-status-warning);
    }

    /* ── R1C3: Skill gap preview ── */
    .cell-rca {
      padding: 4px 10px 6px;
      background: var(--color-surface-default);
      overflow: hidden;
    }

    /* was 7px — bumped to 6pt decorative floor */
    .rca-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-brand);
      font-weight: 700;
      margin-bottom: 3px;
    }

    /* Specimen pane: lead-in → target → two parallel facts → gap tokens.
       The explainer above carries the concept; this pane is pure example. */
    .rca-lead {
      font-size: 9px;
      color: var(--color-text-tertiary);
      margin-bottom: 2px;
    }

    /* no-data fallback (never fires with current data; all 25 pairs have gaps) */
    .rca-hint {
      font-size: 9px;
      color: var(--color-text-tertiary);
      line-height: 1.3;
    }

    /* full name wraps (no truncation); rank rides inline as "(#N)",
       matching how the notes reference occupations */
    .rca-target {
      font-size: 10px;
      font-weight: 700;
      color: var(--color-concept-viable-teal);
      margin-bottom: 3px;
      line-height: 1.2;
    }

    /* facts + pills sit offset right of the target, sketch-style:
       facts one step in, pills one step further (containment) */
    .rca-fact {
      font-size: 9px;
      color: var(--color-text-secondary);
      margin-bottom: 2px;
      margin-left: 8px;
    }

    /* zero-gap (shared-only) pathway note */
    .rca-fact.rca-zero {
      font-style: italic;
      color: var(--color-text-tertiary);
      line-height: 1.35;
    }

    .gap-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      /* one step deeper than the facts: contained by "N skill gaps" above */
      margin: 2px 0 2px 16px;
    }

    /* pills wrap internally (2 lines) rather than forcing their column wider */
    .gap-pill {
      font-size: 8.5px;
      color: var(--color-text-pill-neutral);
      background: var(--color-surface-pill-neutral);
      border-radius: 3px;
      padding: 1px 5px;
      line-height: 1.35;
    }

    .gap-pill.gap-more-pill {
      color: var(--color-text-tertiary);
      font-style: italic;
      background: none;
      padding-left: 0;
    }

    /* ── R2C3: Assessment notes ── */
    .cell-qual {
      padding: 6px 10px 4px;
      background: var(--color-surface-subtle);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* was 7px — bumped to 6pt decorative floor */
    .qual-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-brand);
      font-weight: 700;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .qual-item {
      margin-bottom: 3px;
      padding-left: 6px;
      border-left: 2px solid var(--color-border-subtle);
      flex-shrink: 0;
    }

    .qual-item.up {
      border-left-color: var(--color-status-success);
    }

    .qual-item.down {
      border-left-color: var(--color-status-fail);
    }

    /* was 8px — bumped to ~7pt content floor */
    .qual-occ {
      font-size: 8px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    /* was 7.5px — bumped toward 7pt content floor (secondary text) */
    .qual-explain {
      font-size: 8.5px;
      color: var(--color-text-tertiary);
      line-height: 1.35;
      margin-top: 1px;
    }

    /* was 7px — bumped with note titles */
    .qual-arrow {
      font-size: 8px;
      margin-right: 2px;
    }

    .qual-arrow.up {
      color: var(--color-status-success);
    }

    .qual-arrow.down {
      color: var(--color-status-fail);
    }

    .qual-callout {
      margin-top: auto;
      padding: 5px 8px;
      background: var(--color-surface-subtle);
      border-radius: 3px;
      border-left: 3px solid var(--color-border-strong);
    }

    /* was 7.5px — bumped toward 7pt content floor */
    .qual-callout p {
      font-size: 9px;
      color: var(--color-text-primary);
      line-height: 1.5;
      font-style: italic;
      margin: 0;
    }

    .tt-trigger {
      text-decoration: underline dotted var(--color-status-success);
      font-weight: 600;
      cursor: pointer;
      color: inherit;
    }

    .tt-trigger:hover {
      color: var(--color-status-success);
    }

    .occ-title-tt {
      text-decoration: underline dotted var(--color-text-tertiary);
      cursor: help;
    }

    .tt-comm-box {
      padding: 4px;
    }

    /* tooltip text: was 8.5/7.5/7.5px — bumped with content floors */
    .tt-comm-title {
      font-weight: 700;
      font-size: 9.5px;
      margin-bottom: 4px;
      color: var(--color-text-brand);
    }

    .tt-comm-text {
      color: var(--color-text-primary);
      font-size: 9px;
      line-height: 1.4;
    }

    .tt-divider {
      margin: 6px 0;
      border: 0;
      border-top: 1px solid var(--color-border-subtle);
    }

    .tt-value-small {
      font-size: 9px;
    }

    /* ── COMPACT (<440px iframe width; see compact.js) — lossy per 2026-07-08 decisions:
       stacked single column; similarity bars and the 5-screen dot matrix
       merge into one candidate list (top 7); assessment notes trimmed to
       the callout + 2 items. Desktop 3-column layout untouched. ── */
    html.compact .figure-container {
      width: 100%;
      min-height: 0;
      display: block;
    }

    html.compact .source-band {
      display: none;
    }

    html.compact .fig-body {
      display: block;
    }

    html.compact .dev-wrapper {
      padding: 8px;
    }

    html.compact .col-right {
      display: none;
    }

    html.compact .cols-left {
      display: block;
    }

    html.compact .cw-source {
      background: var(--color-surface-subtle);
      border-bottom: 1px solid var(--color-border-subtle);
      padding: 10px 12px;
    }

    html.compact .cw-comm {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-text-tertiary);
      font-weight: 600;
    }

    html.compact .cw-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-brand);
      line-height: 1.3;
      margin: 2px 0 4px;
    }

    html.compact .cw-detail {
      font-size: 12px;
      color: var(--color-text-tertiary);
      line-height: 1.55;
    }

    html.compact .cw-detail span {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    html.compact .cw-sec-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-brand);
      font-weight: 700;
      padding: 12px 12px 2px;
    }

    html.compact .cw-legend {
      font-size: 11px;
      color: var(--color-text-tertiary);
      padding: 0 12px 6px;
      line-height: 1.4;
    }

    html.compact .cw-headrow {
      display: grid;
      grid-template-columns: 1fr repeat(6, 28px);
      align-items: end;
      padding: 0 12px 3px;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    html.compact .cw-h-screen {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      color: var(--color-text-tertiary);
      text-align: center;
      text-decoration: underline dotted;
      text-underline-offset: 2px;
    }

    html.compact .cw-row {
      display: grid;
      grid-template-columns: 1fr repeat(6, 28px);
      align-items: center;
      padding: 2px 12px;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    /* same attrition semantics as desktop: out = failed and not curated */
    html.compact .cw-row.cw-out {
      opacity: 0.45;
    }

    html.compact .cw-cand {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding-right: 6px;
    }

    html.compact .cw-rank {
      font-size: 11px;
      color: var(--color-text-tertiary);
      font-weight: 600;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    html.compact .cw-barwrap {
      position: relative;
      flex: 1;
      height: 24px;
      min-width: 0;
    }

    html.compact .cw-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--color-chart-similarity);
      border-radius: 2px;
    }

    html.compact .cw-label {
      position: relative;
      z-index: 1;
      font-size: 12px;
      line-height: 24px;
      padding-left: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    html.compact .cw-dot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    html.compact .cw-dot svg {
      width: 16px;
      height: 16px;
    }

    html.compact .cw-key {
      display: inline-flex;
      vertical-align: middle;
    }

    html.compact .cw-key svg {
      width: 12px;
      height: 12px;
    }

    html.compact .cw-more {
      font-size: 11.5px;
      color: var(--color-text-tertiary);
      font-style: italic;
      padding: 6px 12px 2px;
    }

    /* Reused desktop cells, scaled to the 12px floor */
    html.compact .cell-rca {
      border-bottom: 1px solid var(--color-border-default);
      padding: 12px;
      overflow: visible;
    }

    html.compact .rca-title {
      font-size: 11px;
    }

    html.compact .rca-lead {
      font-size: 11.5px;
    }

    html.compact .rca-target {
      font-size: 13px;
      margin-bottom: 4px;
    }

    html.compact .rca-fact {
      font-size: 12px;
    }

    html.compact .gap-pill {
      font-size: 11.5px;
      padding: 2px 7px;
    }

    html.compact .cell-qual {
      padding: 12px;
      overflow: visible;
    }

    html.compact .qual-title {
      font-size: 12px;
    }

    html.compact .qual-item {
      margin-bottom: 6px;
      padding-left: 8px;
    }

    html.compact .qual-occ {
      font-size: 12.5px;
    }

    html.compact .qual-explain {
      font-size: 11.5px;
    }

    html.compact .qual-arrow {
      font-size: 11px;
    }

    html.compact .qual-callout {
      margin-top: 8px;
    }

    html.compact .qual-callout p {
      font-size: 11.5px;
    }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="iframe-controls">
      <div class="control-group">
        <label>Community</label>
        <select id="ui-community"></select>
      </div>
      <div class="control-group">
        <label>Source</label>
        <select id="ui-source"></select>
      </div>
    </div>
    <div class="figure-container">
      <div class="source-band" id="grid-band"></div>
      <div class="fig-body">
        <div class="cols-left" id="grid-left"></div>
        <div class="col-right" id="grid-right"></div>
      </div>
    </div>
  </div>

  <script>
    let currentMetric = (new URLSearchParams(location.search).get('metric') === 'euclidean') ? 'euclidean' : 'cosine';
    const CACHE = {};

    // Screen definitions (shared by the desktop heatmap headers and the
    // compact merged candidate list).
    const hmDefs = {
      Pool: 'Provincial labour pool — candidate occupation has reported workers in this province (2021 Census).',
      TEER: 'Training alignment — candidate TEER within the accepted window around the source occupation’s (comparable, or more extensive training).',
      Earn: 'Earnings differential — provincial median income ≥ 65% of the source occupation\'s. Amber = passes but below parity.',
      COPS: 'Occupational outlook — federal COPS projections; fails on projected labour surplus.',
      'A.I.': 'AI exposure — Dais (2025) ratings; high exposure excluded.',
      'Qual.': 'Qualitative community review — curated pick (green), susceptible-sector exclusion (red), or no local presence (amber). Approximated from IRPP community profiles.',
    };

    // Lucide-style status icons — shared by the desktop matrix, the compact
    // candidate list, and both legends.
    const svgCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;
    const svgCross = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`;

    // Tooltip wiring shared by both render modes.
    function attachTips() {
      if (typeof tippy === 'undefined') return;
      document.querySelectorAll('[data-tt-label]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${el.dataset.ttLabel}</div>`
            + `<div class="tt-value">Similarity: ${el.dataset.ttSim}</div>`
            + `<div class="tt-value">TEER: ${el.dataset.ttTeer}</div>`,
          allowHTML: true,
          placement: 'right',
          appendTo: document.body,
        });
      });

      // Screening headers + RCA preview rows: "title|body" data-tips.
      document.querySelectorAll('[data-tip]').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const [tipTitle, tipBody] = el.dataset.tip.split('|');
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${tipTitle}</div><div class="tt-value">${tipBody}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Dynamic community review tooltips
      document.querySelectorAll('.tt-trigger').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        const cd = el.getAttribute('data-tt-cd');
        const ratHtml = el.getAttribute('data-tt-rat') || '';
        const basePara = COMMUNITY_TOOLTIPS[cd] || 'Local community profile context.';

        let content = `<div class="tt-comm-box">`;
        content += `<div class="tt-comm-title">Simulated Community Review</div>`;
        content += `<div class="tt-comm-text">${basePara}</div>`;
        if (ratHtml) {
          content += ratHtml;
        }
        content += `</div>`;

        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: content,
          allowHTML: true,
          interactive: true,
          trigger: 'click mouseenter',
          appendTo: document.body,
        });
      });

      // Occupation title tooltips
      document.querySelectorAll('.occ-title-tt').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });

      // Screen dot tooltips
      document.querySelectorAll('.screen-dot').forEach(el => {
        if (el._tippy) el._tippy.destroy();
        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-value tt-value-small">${el.getAttribute('data-tippy-content')}</div>`,
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
        });
      });
    }

    function getDotTooltip(col, c, t) {
      const parts = [];

      const sl = t.source_lmi || {};
      const srcInc = sl.pr_income || 0;

      if (col === 'teer') {
        const delta = c.teer - t.source_teer;
        let deltaText = '';
        if (delta === 0) {
          deltaText = 'same level of educational requirements';
        } else if (delta > 0) {
          deltaText = `${delta} level(s) less of educational requirements`;
        } else {
          deltaText = `${Math.abs(delta)} level(s) more of educational requirements`;
        }
        parts.push(`<strong>TEER ${c.teer}:</strong> ${deltaText}`);
      } else if (col === 'wages') {
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const pct = Math.round(Math.abs(wRatio - 1) * 100);
        const rel = wRatio >= 1.0 ? 'higher' : 'lower';
        const incomeStr = c.pr_income != null ? '$' + Math.round(c.pr_income).toLocaleString() : '—';
        if (srcInc > 0) {
          parts.push(`<strong>Income:</strong> ${incomeStr} (${pct}% ${rel} than source)`);
        } else {
          parts.push(`<strong>Income:</strong> ${incomeStr}`);
        }
      } else if (col === 'cops') {
        parts.push(`<strong>COPS outlook:</strong> ${c.cops || 'Unknown'}`);
      } else if (col === 'ai') {
        parts.push(`<strong>AI exposure:</strong> ${c.ai || 'Unknown'}`);
      } else if (col === 'qual') {
        const reasons = [];
        if (c.screen_local_presence === false) {
          reasons.push('No local workers');
        }
        if (c.screen_susceptible === false) {
          reasons.push('Lack of alignment with simulated community review');
        }
        if (reasons.length === 0) {
          reasons.push('Passed qualitative review');
        }
        parts.push(`<strong>Qualitative:</strong> ${reasons.join(' & ')}`);
      } else if (col === 'prov') {
        const prW = c.pr_workers != null ? Math.round(c.pr_workers).toLocaleString() : '0';
        parts.push(`<strong>Provincial labour pool:</strong> ${prW} workers`);
      }
      return parts.join('<hr class="tt-divider">');
    }

    const COMMUNITY_TOOLTIPS = {
      "1003": "Division No. 3 relies heavily on maritime transport (such as regional ferry operations) and marine harvesting. Long-term transitions face a vulnerable resource base, but are supported locally by municipal public works and infrastructure demand from reconstruction projects.",
      "3532": "Oxford's economy is integrated with automotive assembly and related manufacturing. Motor vehicle parts manufacturing and regional logistics along the Highway 401 corridor provide alternative transition avenues, alongside southwestern Ontario's broader plastics and metalworking corridors.",
      "3557": "Algoma's economy is historically anchored by steel manufacturing. As primary metal industries adopt low-emission technologies, local transition planning leverages regional assets in forestry, metal fabrication, and critical mineral development.",
      "4615": "Neepawa has a dual-sector economy built on agriculture and food manufacturing (anchored by major meat packing operations). Local opportunities bridge between agricultural management, food processing, and public infrastructure maintenance.",
      "4701": "Estevan relies on a mix of agriculture and energy sectors (coal mining, coal-fired power plants, and oil/gas extraction). As traditional energy generation undergoes transitions, the region leverages a strong transport logistics base (rail corridor), municipal public works, and college training programs.",
      "4816": "Division No. 16 is highly dependent on oilsands extraction and related industrial maintenance, where employment is sensitive to global commodity markets, decarbonization targets, and automation. Transition pathways in the region align with local opportunities in heavy maintenance, welding, electrical servicing, and construction logistics.",
      "PR61": "The Northwest Territories has a hybrid economy combining resource extraction (diamond mines and critical minerals) with a large public services sector. Regional pathways focus on maintaining vital community infrastructure, transport networks, and public utilities."
    };

    // ── COMPACT render branch (same data, stacked, lossy) ──
    function buildCompactWalkthrough(t) {
      const cands = t.candidates.slice(0, 7);
      const nTrimmed = t.candidates.length - cands.length;
      const sl = t.source_lmi || {};
      const maxSim = Math.max(...cands.map(c => c.similarity));
      const barW = sim => ((sim - 0.70) / (maxSim - 0.70)) * 100;
      const fmt$ = v => v != null ? '$' + Math.round(v).toLocaleString() : '—';
      const fmtW = v => v != null ? Math.round(v).toLocaleString() : '—';
      const geoWord = (t.cd || '').startsWith('PR') ? 'Territorial' : 'Provincial';

      // Same screen derivation as the desktop matrix (incl. the corrected
      // TEER window — the compact branch previously kept the pre-2026-07-08
      // rule) plus the Pool screen.
      const srcInc = sl.pr_income || 0;
      function deriveFilters(c) {
        const delta = c.teer - t.source_teer;
        const teer = (c.teer < 2 || delta < -2 || delta > 1) ? 'red' : (delta < 0 ? 'yellow' : 'green');
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const wages = wRatio >= 1.0 ? 'green' : wRatio >= 0.65 ? 'yellow' : 'red';
        const cops = ((c.cops || '').toLowerCase()).includes('surplus') ? 'red' : 'green';
        const ai = ((c.ai || '').toLowerCase()).includes('high') ? 'red' : 'green';
        const qual = c.qual_signal || 'green';
        const prov = (c.pr_workers != null && c.pr_workers > 0) ? 'green' : 'red';
        return { prov, teer, wages, cops, ai, qual };
      }
      const dotHtml = (sig, tooltipText) => `<div class="cw-dot ${sig === 'green' ? 'hm-ok' : sig === 'yellow' ? 'hm-warn' : 'hm-fail'} screen-dot" data-tippy-content="${tooltipText.replace(/"/g, '&quot;')}">${sig === 'red' ? svgCross : svgCheck}</div>`;

      // Notes labels, hoisted: the curated set drives the fade supersede in
      // the candidate list; the notes section below reuses them.
      const an = t.assessment_notes || { notes: [] };
      const cDownLabels = [];
      const cUpLabels = [];
      const cUpNocs = [];
      an.notes.forEach(note => {
        if (note.type === 'callout') return;
        if (note.type === 'down') {
          cDownLabels.push(...note.labels);
        } else if (note.type === 'up') {
          cUpLabels.push(...note.labels);
          note.labels.forEach(l => { if (l.noc && !cUpNocs.includes(l.noc)) cUpNocs.push(l.noc); });
        }
      });
      cDownLabels.sort((a, b) => a.rank - b.rank);
      cUpLabels.sort((a, b) => a.rank - b.rank);
      const curatedNocs = cUpNocs.map(String);

      let html = '';

      // 1 — Source card
      html += `<div class="cw-source">
        <div class="cw-comm">${t.community}</div>
        <div class="cw-name">${t.source_label}</div>
        <div class="cw-detail">TEER level <span>${t.source_teer}</span> · Sector: <span>${t.sector}</span></div>
        <div class="cw-detail">${geoWord} income <span>${fmt$(sl.pr_income)}</span> · workers <span>${fmtW(sl.pr_workers)}</span></div>
      </div>`;

      // 2 — Merged candidates: similarity bar + 6 screening dots per row
      const compactHeads = { Pool: 'Pool', TEER: 'TEER', Earn: 'Earn', COPS: 'COPS', 'A.I.': 'A.I.', 'Qual.': 'Qual' };
      html += `<div class="cw-sec-title">Skill-similar candidates &amp; screening</div>`;
      html += `<div class="cw-legend">Bar length = skills similarity · <span class="hm-ok cw-key">${svgCheck}</span><span class="hm-warn cw-key">${svgCheck}</span> = pass · <span class="hm-fail cw-key">${svgCross}</span> = fail · faded = screened out · tap a heading or row for detail</div>`;
      html += `<div class="cw-headrow"><div></div>` + Object.keys(hmDefs).map(k =>
        `<div class="cw-h-screen" data-tip="${k === 'Qual.' ? 'Qual' : k}|${hmDefs[k].replace(/"/g, '&quot;')}">${compactHeads[k]}</div>`).join('') + `</div>`;
      cands.forEach(c => {
        const f = deriveFilters(c);
        const allGreen = f.prov === 'green' && f.teer !== 'red' && f.wages !== 'red'
          && f.cops === 'green' && f.ai === 'green' && f.qual === 'green';
        const out = !allGreen && !curatedNocs.includes(String(c.noc || ''));
        html += `<div class="cw-row ${out ? 'cw-out' : ''}" data-tt-label="${c.label}" data-tt-sim="${c.similarity.toFixed(3)}" data-tt-teer="${c.teer}">
          <div class="cw-cand">
            <span class="cw-rank">${c.rank}</span>
            <div class="cw-barwrap">
              <div class="cw-bar" style="width:${barW(c.similarity)}%"></div>
              <div class="cw-label">${c.label}</div>
            </div>
          </div>
          ${dotHtml(f.prov, getDotTooltip('prov', c, t))}${dotHtml(f.teer, getDotTooltip('teer', c, t))}${dotHtml(f.wages, getDotTooltip('wages', c, t))}${dotHtml(f.cops, getDotTooltip('cops', c, t))}${dotHtml(f.ai, getDotTooltip('ai', c, t))}${dotHtml(f.qual, getDotTooltip('qual', c, t))}
        </div>`;
      });
      if (nTrimmed > 0) html += `<div class="cw-more">+${nTrimmed} more candidate${nTrimmed > 1 ? 's' : ''} in the full (desktop) figure</div>`;

      // 3 — Skill gap preview: same specimen grammar as desktop
      //     (lead-in → target (#rank) → facts → gap pills)
      const fg = t.featured_gap;
      html += `<div class="cell-rca">`;
      html += `<div class="rca-title">Skill gaps</div>`;
      if (fg && fg.summary) {
        const sharedStr = (fg.shared_skills || []).join('<br>').replace(/"/g, '&quot;');
        const tgtRank = (t.candidates.find(c => c.noc === fg.target_noc) || {}).rank;
        html += `<div class="rca-lead">One sample pathway:</div>`;
        html += `<div class="rca-target">${fg.target_label}${tgtRank != null ? ` (#${tgtRank})` : ''}</div>`;
        html += `<div class="rca-fact"><span class="occ-title-tt" data-tippy-content="${sharedStr}">${fg.summary.shared} shared skills</span></div>`;
        if ((fg.gaps || []).length > 0) {
          const topGaps = fg.gaps.slice(0, 3);
          const moreGaps = fg.gaps.slice(3);
          html += `<div class="rca-fact">${fg.summary.gaps} skill gap${fg.summary.gaps > 1 ? 's' : ''}</div>`;
          html += `<div class="gap-pills">`
            + topGaps.map(g => `<span class="gap-pill">${g}</span>`).join('')
            + (moreGaps.length > 0 ? `<span class="gap-pill gap-more-pill occ-title-tt" data-tippy-content="${moreGaps.join('<br>').replace(/"/g, '&quot;')}">+${moreGaps.length} more</span>` : '')
            + `</div>`;
        } else {
          // Shared-only ("near-twin") pathway — short note, see Figure I for long
          html += `<div class="rca-fact rca-zero">No skill gaps — differences may remain in other domains or in credentials not captured by the taxonomy.</div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="rca-hint">No skill-gap data available for this pair's top matches.</div></div>`;
      }

      // 4 — Assessment notes, collapsed to 2 notes max (labels hoisted above)
      html += `<div class="cell-qual">`;
      html += `<div class="qual-title">Assessment notes</div>`;
      if (cDownLabels.length > 0) {
        const labelsHtml = formatNoteTitle(cDownLabels, '↓', 'down');
        html += `<div class="qual-item down">
          <div class="qual-occ">${labelsHtml}</div>
          <div class="qual-explain">Not viable: failed one or more viability screens</div>
        </div>`;
      }
      if (cUpLabels.length > 0) {
        const labelsHtml = formatNoteTitle(cUpLabels, '↑', 'up');
        const triggerSpan = `<span class="tt-trigger" data-tt-cd="${t.cd}" data-tt-noc="${cUpNocs.join(',')}">community review</span>`;
        html += `<div class="qual-item up">
          <div class="qual-occ">${labelsHtml}</div>
          <div class="qual-explain">Curated selection: surfaced by simulated ${triggerSpan} — may override other screening results</div>
        </div>`;
      }
      html += `</div>`;

      document.getElementById('grid-band').innerHTML = '';
      document.getElementById('grid-left').innerHTML = html;
      document.getElementById('grid-right').innerHTML = '';

      attachTips();
      reportSize();
    }

    function formatNoteTitle(labels, arrow, type) {
      if (!labels || labels.length === 0) return '';
      let titleText = '';
      if (labels.length <= 3) {
        if (labels.length === 1) {
          titleText = labels[0].text;
        } else if (labels.length === 2) {
          titleText = `${labels[0].text} and ${labels[1].text}`;
        } else {
          titleText = `${labels[0].text}, ${labels[1].text}, and ${labels[2].text}`;
        }
      } else {
        titleText = `${labels[0].text}, ${labels[1].text}, and ${labels.length - 2} more`;
      }
      const tipParts = labels.map(lbl => {
        return `<strong>NOC ${lbl.noc}:</strong> ${lbl.full_title} <span style="opacity: 0.8; font-style: italic;">(#${lbl.rank})</span>`;
      });
      const tipContent = tipParts.join('<span style="margin: 0 6px; opacity: 0.5;">·</span>');
      return `<span class="occ-title-tt" data-tippy-content="${tipContent.replace(/"/g, '&quot;')}"><span class="qual-arrow ${type}">${arrow}</span> ${titleText}</span>`;
    }

    function buildWalkthrough(t) {
      if (window.isCompact && window.isCompact()) { buildCompactWalkthrough(t); return; }
      const cands = t.candidates;
      const sl = t.source_lmi || {};
      const maxSim = Math.max(...cands.map(c => c.similarity));
      const barW = sim => ((sim - 0.70) / (maxSim - 0.70)) * 100;

      function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }

      // Derive viability signals
      const srcInc = sl.pr_income || 0;
      function deriveFilters(c) {
        const delta = c.teer - t.source_teer;
        const teer = (c.teer < 2 || delta < -2 || delta > 1) ? 'red' : (delta < 0 ? 'yellow' : 'green');
        const wRatio = srcInc > 0 ? c.pr_income / srcInc : 0;
        const wages = wRatio >= 1.0 ? 'green'
          : wRatio >= 0.65 ? 'yellow' : 'red';
        const copsRaw = (c.cops || '').toLowerCase();
        const cops = copsRaw.includes('surplus') ? 'red' : 'green';
        const aiRaw = (c.ai || '').toLowerCase();
        const ai = aiRaw.includes('high') ? 'red' : 'green';
        const qual = c.qual_signal || 'green';
        const prov = (c.pr_workers != null && c.pr_workers > 0) ? 'green' : 'red';
        return { prov, teer, wages, cops, ai, qual };
      }

      const stepChip = n => `<span class="exp-step">${n}</span>`;
      function sigDot(signal, tooltipText) {
        const cls = signal === 'green' ? 'hm-ok'
          : signal === 'yellow' ? 'hm-warn' : 'hm-fail';
        const icon = signal === 'red' ? svgCross : svgCheck;
        return `<div class="hm-dot ${cls} screen-dot" data-tippy-content="${tooltipText.replace(/"/g, '&quot;')}">${icon}</div>`;
      }

      let left = '';
      let right = '';

      // ═══ Source band (full width) ═══
      document.getElementById('grid-band').innerHTML = `${stepChip(1)}
        <div class="band-headline"><span class="em3">${t.source_label}</span> in <span class="em2">${t.community}</span></div>
        <div class="band-subline">Susceptible occupation identified by sector exposure in <span class="em1">${t.sector}</span></div>`;

      // ═══ Row 1: explainer panels (double as column headers) ═══
      left += `<div class="cell-explain c1">${stepChip(2)}
      <div class="exp-title">Similar occupations</div>
      <div class="exp-body">Candidates ranked by similarity of competency profiles — 166 OaSIS competencies spanning skills, knowledge, abilities, and work context.</div>
    </div>`;
      left += `<div class="cell-explain c2">${stepChip(3)}
      <div class="exp-title">From similar to viable</div>
      <div class="exp-body">Each candidate is screened for economic viability. A qualitative review confirms community fit. <span class="exp-legend"><span class="hm-ok hm-dot">${svgCheck}</span><span class="hm-warn hm-dot">${svgCheck}</span>\u2009=\u2009pass \u00b7 <span class="hm-fail hm-dot">${svgCross}</span>\u2009=\u2009fail</span></div>
      <div class="hm-header">` + Object.keys(hmDefs).map(k =>
        `<div class="hm-h-col" data-tip="${k === 'Qual.' ? 'Qual' : k}|${hmDefs[k].replace(/"/g, '&quot;')}">${k}</div>`).join('') + `</div>
    </div>`;

      // ═══ Row 2, col 1: similarity bars ═══
      left += `<div class="cell-similar">`;
      left += `<div class="sim-rows">`;
      cands.forEach(c => {
        left += `<div class="sim-row" data-tt-label="${c.label}" data-tt-sim="${c.similarity.toFixed(3)}" data-tt-teer="${c.teer}" data-tt-noc="${c.noc || ''}">
        <div class="sim-rank">${c.rank}</div>
        <div class="sim-bar-wrap">
          <div class="sim-bar" style="width:${barW(c.similarity)}%"></div>
          <div class="sim-label">${trunc(c.label, 30)}</div>
        </div>
      </div>`;
      });
      left += `</div></div>`;

      // ═══ Row 2, col 2: viability heatmap ═══
      left += `<div class="cell-filtered">`;
      left += `<div class="hm-grid">`;
      left += `<div class="hm-data-rows">`;
      // Curated picks never fade: the review supersedes the screens.
      const curatedNocs = [];
      ((t.assessment_notes || {}).notes || []).forEach(n => {
        if (n.type === 'up') (n.labels || []).forEach(l => { if (l.noc) curatedNocs.push(String(l.noc)); });
      });
      cands.forEach(c => {
        const f = deriveFilters(c);
        const allGreen = f.prov === 'green' && f.teer !== 'red' && f.wages !== 'red'
          && f.cops === 'green' && f.ai === 'green' && f.qual === 'green';
        const out = !allGreen && !curatedNocs.includes(String(c.noc || ''));
        const rowCls = out ? 'hm-out' : '';
        left += `<div class="hm-row ${rowCls}">
        ${sigDot(f.prov, getDotTooltip('prov', c, t))}
        ${sigDot(f.teer, getDotTooltip('teer', c, t))}
        ${sigDot(f.wages, getDotTooltip('wages', c, t))}
        ${sigDot(f.cops, getDotTooltip('cops', c, t))}
        ${sigDot(f.ai, getDotTooltip('ai', c, t))}
        ${sigDot(f.qual, getDotTooltip('qual', c, t))}
      </div>`;
      });
      left += `</div></div></div>`;

      // ═══ Col 3, row 1: skill-gap explainer (aligns with the other panels) ═══
      right += `<div class="cell-explain c3">${stepChip(4)}
      <div class="exp-title">Skill gaps</div>
      <div class="exp-body">Skills the target occupation relies on more than average, but the source does not. Useful for planning training or comparing pathways.</div>
    </div>`;

      // ═══ Col 3, row 2: rail — skill gaps on top, assessment notes below
      //     (caveat callout omitted in D2) ═══
      right += `<div class="rail-stack">`;
      const fg = t.featured_gap;
      right += `<div class="cell-rca">`;
      if (fg && fg.summary) {
        const sharedStr = (fg.shared_skills || []).join('<br>').replace(/"/g, '&quot;');
        const tgtRank = (t.candidates.find(c => c.noc === fg.target_noc) || {}).rank;
        right += `<div class="rca-lead">One sample pathway:</div>`;
        right += `<div class="rca-target">${fg.target_label}${tgtRank != null ? ` (#${tgtRank})` : ''}</div>`;
        right += `<div class="rca-fact"><span class="occ-title-tt" data-tippy-content="${sharedStr}">${fg.summary.shared} shared skills</span></div>`;
        if ((fg.gaps || []).length > 0) {
          // Visible pills favour one-line labels: long ones are deranked into
          // "+N more" (tooltip) so the pane keeps a stable height. Two-line
          // wrap inside a pill remains the fallback when short labels run out.
          // ~33 chars ≈ one pill line at 8.5px in a third-width column.
          const fitsLine = g => g.length <= 33;
          const shortG = fg.gaps.filter(fitsLine);
          const visible = shortG.slice(0, 3);
          if (visible.length < 3) visible.push(...fg.gaps.filter(g => !fitsLine(g)).slice(0, 3 - visible.length));
          const topGaps = fg.gaps.filter(g => visible.includes(g));   // data order preserved
          const moreGaps = fg.gaps.filter(g => !visible.includes(g));
          right += `<div class="rca-fact">${fg.summary.gaps} skill gap${fg.summary.gaps > 1 ? 's' : ''}</div>`;
          right += `<div class="gap-pills">`
            + topGaps.map(g => `<span class="gap-pill">${g}</span>`).join('')
            + (moreGaps.length > 0 ? `<span class="gap-pill gap-more-pill occ-title-tt" data-tippy-content="${moreGaps.join('<br>').replace(/"/g, '&quot;')}">+${moreGaps.length} more</span>` : '')
            + `</div>`;
        } else {
          // Shared-only ("near-twin") pathway: data-true zero, not missing
          // data. Short note here; the long version lives in Figure I.
          right += `<div class="rca-fact rca-zero">No skill gaps — differences may remain in other domains or in credentials not captured by the taxonomy.</div>`;
        }
        right += `</div>`;
      } else {
        right += `<div class="rca-hint">No skill-gap data available for this pair's top matches.</div></div>`;
      }

      // Assessment notes below the gap preview — collapsed to 2 notes max
      right += `<div class="cell-qual">`;
      right += `<div class="qual-title">Assessment notes</div>`;
      const an = t.assessment_notes || { notes: [] };
      const downLabels = [];
      const upLabels = [];
      const upNocs = [];
      an.notes.forEach(note => {
        if (note.type === 'callout') return;
        if (note.type === 'down') {
          downLabels.push(...note.labels);
        } else if (note.type === 'up') {
          upLabels.push(...note.labels);
          note.labels.forEach(l => { if (l.noc && !upNocs.includes(l.noc)) upNocs.push(l.noc); });
        }
      });
      downLabels.sort((a, b) => a.rank - b.rank);
      upLabels.sort((a, b) => a.rank - b.rank);
      if (downLabels.length > 0) {
        const labelsHtml = formatNoteTitle(downLabels, '↓', 'down');
        right += `<div class="qual-item down">
            <div class="qual-occ">${labelsHtml}</div>
            <div class="qual-explain">Not viable: failed one or more viability screens</div>
          </div>`;
      }
      if (upLabels.length > 0) {
        const labelsHtml = formatNoteTitle(upLabels, '↑', 'up');
        const triggerSpan = `<span class="tt-trigger" data-tt-cd="${t.cd}" data-tt-noc="${upNocs.join(',')}">community review</span>`;
        right += `<div class="qual-item up">
            <div class="qual-occ">${labelsHtml}</div>
            <div class="qual-explain">Curated selection: surfaced by simulated ${triggerSpan} — may override other screening results</div>
          </div>`;
      }
      right += `</div>`;
      right += `</div>`; // close .rail-stack

      document.getElementById('grid-left').innerHTML = left;
      document.getElementById('grid-right').innerHTML = right;

      attachTips();
      reportSize();
    }

    let activeCd = '3532';
    let activeSrc = '75101';

    const uiCommunity = document.getElementById('ui-community');
    const uiSource = document.getElementById('ui-source');

    function populateControls(FULL_DATA) {
      if (!uiCommunity || !uiSource) return;

      let tempCd = activeCd;
      uiCommunity.innerHTML = '';
      for (const cd in FULL_DATA) {
        const firstSrc = Object.keys(FULL_DATA[cd])[0];
        const opt = document.createElement('option');
        opt.value = cd;
        opt.textContent = FULL_DATA[cd][firstSrc].community;
        if (cd === tempCd) opt.selected = true;
        uiCommunity.appendChild(opt);
      }

      function updateSources() {
        uiSource.innerHTML = '';
        const cd = uiCommunity.value;
        const sources = FULL_DATA[cd];
        let foundActive = false;
        for (const src in sources) {
          const opt = document.createElement('option');
          opt.value = src;
          opt.textContent = sources[src].source_label;
          if (src === activeSrc) {
            opt.selected = true;
            foundActive = true;
          }
          uiSource.appendChild(opt);
        }
        if (!foundActive && uiSource.options.length > 0) {
          activeSrc = uiSource.options[0].value;
          uiSource.options[0].selected = true;
        }
      }

      updateSources();

      uiCommunity.onchange = (e) => {
        activeCd = e.target.value;
        updateSources();
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };

      uiSource.onchange = (e) => {
        activeSrc = e.target.value;
        buildWalkthrough(FULL_DATA[activeCd][activeSrc]);
      };
    }

    function loadAndRender(metric) {
      if (CACHE[metric]) {
        populateControls(CACHE[metric]);
        buildWalkthrough(CACHE[metric][activeCd][activeSrc]);
        return;
      }
      fetch(`../data/D_walkthrough.all.${metric}.json`)
        .then(r => r.json())
        .then(DATA => {
          CACHE[metric] = DATA;
          populateControls(DATA);
          buildWalkthrough(DATA[activeCd][activeSrc]);
        });
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      const ctrls = document.querySelector('.iframe-controls');
      let h = document.querySelector('.dev-wrapper').scrollHeight;

      if (c) parent.postMessage({ type: 'figure-sized', fig: 'D2_walkthrough', width: c.scrollWidth, height: h }, '*');
    }

    // Listen for in-place metric switch or active pair switch from parent
    window.addEventListener('message', e => {
      if (!e.data) return;
      let needsRender = false;

      if (e.data.type === 'set-metric' && e.data.metric && e.data.metric !== currentMetric) {
        currentMetric = e.data.metric;
        needsRender = true;
      }

      if (e.data.type === 'set-active-pair') {
        if (e.data.cd && e.data.cd !== activeCd) { activeCd = e.data.cd; needsRender = true; }
        if (e.data.src && e.data.src !== activeSrc) { activeSrc = e.data.src; needsRender = true; }
      }

      if (needsRender) loadAndRender(currentMetric);
    });

    window.addEventListener('compactmodechange', () => loadAndRender(currentMetric));

    loadAndRender(currentMetric);
  </script>

  <!-- CTP WP Engine Embed Helper -->
  <script>
    if (window.self !== window.top) {
      document.body.classList.add('export-mode');
      window.addEventListener('load', () => {
        setTimeout(() => {
          const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
          const ctrls = document.querySelector('.iframe-controls');
          let h = document.querySelector('.dev-wrapper').scrollHeight;

          if (c) {
            const fig = location.pathname.split('/').pop().replace('.html', '');
            parent.postMessage({
              type: 'figure-sized',
              fig: fig,
              width: c.scrollWidth,
              height: h
            }, '*');
          }
        }, 100);
      });
    }
  </script>
</body>
