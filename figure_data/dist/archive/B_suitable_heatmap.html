<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suitable Heatmap</title>
  <link rel="stylesheet" href="theme.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      height: auto;
      min-height: 420px;
      padding: var(--sp-16) var(--sp-14) var(--sp-12);
    }

    .heatmap-table {
      border-collapse: collapse;
      font-size: var(--fs-body);
      width: auto;
    }

    .heatmap-table th {
      font-weight: var(--fw-medium);
      color: var(--clr-body-secondary);
      padding: var(--sp-4) 4px;
      text-align: center;
      vertical-align: bottom;
      border-bottom: 1px solid var(--clr-border);
    }

    .heatmap-table th.col-header {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      height: 185px;
      white-space: normal;
      max-width: 2.4em;
      font-size: 10px;
      padding: var(--sp-6) 2px;
      line-height: 1.3;
      text-align: left;
      vertical-align: middle;
    }

    .heatmap-table th.row-header {
      text-align: right;
      padding-right: var(--sp-6);
      font-size: 10px;
      max-width: 190px;
      line-height: 1.3;
      font-weight: var(--fw-medium);
      color: var(--clr-body);
      border-bottom: none;
    }

    .comm-pills { display: block; margin-top: 1px; }

    .comm-pill {
      display: inline-block;
      font-size: 8px;
      font-weight: var(--fw-semibold);
      letter-spacing: 0.3px;
      padding: 0.5px 3px;
      border-radius: 2px;
      background: var(--clr-bg-muted);
      border: 1px solid var(--clr-border);
      color: var(--clr-body-secondary);
      margin-left: 1px;
      line-height: 1.4;
    }

    .heatmap-table td {
      text-align: center;
      padding: 1px 1px;
      min-width: 30px;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      border-bottom: none;
    }

    .hm-cell {
      border-radius: 2px;
      display: inline-block;
      width: 28px;
      height: 18px;
      line-height: 18px;
      font-size: 9.5px;
      color: #fff;
      cursor: default;
    }

    /* ── COMPACT (<640px iframe width): sticky source column + horizontal
       scroll (dense-grid treatment per 2026-07-08 decisions). ── */
    .compact-scroll-hint { display: none; }

    html.compact .figure-container { width: 100%; min-height: 0; padding: 10px 0 12px; }
    html.compact .dev-wrapper { padding: 8px; }
    html.compact .compact-scroll-hint {
      display: block;
      font-size: 11px;
      color: var(--clr-body-secondary);
      padding: 0 12px 6px;
    }
    html.compact #heatmap-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    html.compact .heatmap-table th.row-header {
      position: sticky; left: 0; z-index: 2;
      background: #fff;
      font-size: 12px;
      min-width: 138px; max-width: 138px;
      padding-left: 10px;
      box-shadow: 3px 0 4px -2px rgba(0, 0, 0, 0.12);
    }
    html.compact .heatmap-table th.col-header { font-size: 11px; height: 150px; }
    /* Community pills dropped in compact (kept row heights near one line);
       cell tooltips still name the member occupations. */
    html.compact .comm-pills { display: none; }
    html.compact .heatmap-table td { min-width: 40px; }
    html.compact .hm-cell { width: 36px; height: 24px; line-height: 24px; font-size: 12px; }

    .hm-0 { background: #f0efe9; color: #ccc; }
    .hm-1 { background: var(--irpp-navy-light); color: var(--clr-body); }
    .hm-2 { background: #7a9db8; color: #fff; }
    .hm-3 { background: #4d7d9e; color: #fff; }
    .hm-4 { background: #2a6485; color: #fff; }
    .hm-5 { background: var(--irpp-navy); color: #fff; }
    .hm-7 { background: #002d44; color: #fff; }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="figure-container">
      <div class="compact-scroll-hint">Swipe sideways for more destination groups →</div>
      <div id="heatmap-container"></div>
    </div>
  </div>

  <script>
    let currentMetric = (new URLSearchParams(location.search).get('metric') === 'euclidean') ? 'euclidean' : 'cosine';
    const CACHE = {};

    function buildHeatmap(cells, sourceComms) {
      // Destroy existing tippy instances to avoid orphans
      document.querySelectorAll('.hm-cell').forEach(el => { if (el._tippy) el._tippy.destroy(); });

      const destCounts = {};
      const srcCounts = {};
      cells.forEach(c => {
        destCounts[c.dest_noc3] = (destCounts[c.dest_noc3] || 0) + c.count;
        srcCounts[c.source_noc] = (srcCounts[c.source_noc] || 0) + c.count;
      });
      const dests = Object.keys(destCounts).sort((a, b) => destCounts[b] - destCounts[a]);
      const sources = Object.keys(srcCounts).sort((a, b) => srcCounts[b] - srcCounts[a]);

      const srcLabels = {};
      const destLabels = {};
      cells.forEach(c => {
        srcLabels[c.source_noc] = c.source_label;
        destLabels[c.dest_noc3] = c.dest_label;
      });

      const lookup = {};
      cells.forEach(c => {
        lookup[`${c.source_noc}|${c.dest_noc3}`] = c;
      });

      function hmClass(v) {
        if (v === 0) return 'hm-0';
        if (v === 1) return 'hm-1';
        if (v === 2) return 'hm-2';
        if (v === 3) return 'hm-3';
        if (v <= 5) return 'hm-4';
        if (v <= 7) return 'hm-5';
        return 'hm-7';
      }

      let html = '<table class="heatmap-table">';
      html += '<tr><th></th>';
      dests.forEach(d => {
        html += `<th class="col-header" title="${destLabels[d]}">${destLabels[d]}</th>`;
      });
      html += '</tr>';

      sources.forEach(s => {
        const pills = (sourceComms && sourceComms[s])
          ? '<span class="comm-pills">' + sourceComms[s].map(c =>
            `<span class="comm-pill">${c}</span>`
          ).join('') + '</span>'
          : '';

        html += `<tr><th class="row-header">${srcLabels[s]}${pills}</th>`;
        dests.forEach(d => {
          const cell = lookup[`${s}|${d}`];
          const v = cell ? cell.count : 0;

          html += `<td><span class="hm-cell ${hmClass(v)}" data-cell="${s}|${d}">`
            + `${v || ''}</span></td>`;
        });
        html += '</tr>';
      });

      html += '</table>';
      document.getElementById('heatmap-container').innerHTML = html;

      // ── Tippy tooltips on non-zero cells: name the actual occupations ──
      document.querySelectorAll('.hm-cell:not(.hm-0)').forEach(el => {
        const cell = lookup[el.dataset.cell];
        if (!cell) return;
        const members = (cell.members || []).map(m =>
          `<div class="tt-value">${m.label} <span style="opacity:0.65">· ${m.sim.toFixed(3)}</span></div>`).join('');

        tippy(el, {
          theme: 'irpp',
          animation: 'shift-away',
          content: `<div class="tt-title">${cell.dest_label}</div>`
            + `<div class="tt-value">${cell.count} of the top-10 skills matches for <strong>${cell.source_label}</strong>:</div>`
            + members
            + (cell.avg_sim ? `<hr class="tt-divider"><div class="tt-value">Avg. similarity: ${cell.avg_sim.toFixed(3)}</div>` : ''),
          allowHTML: true,
          placement: 'top',
        });
      });

      reportSize();
    }

    function loadAndRender(metric) {
      if (CACHE[metric]) { buildHeatmap(CACHE[metric].heatmap, CACHE[metric].source_communities); return; }
      fetch(`../data/B_suitable_heatmap.${metric}.json`)
        .then(r => r.json())
        .then(DATA => { CACHE[metric] = DATA; buildHeatmap(DATA.heatmap, DATA.source_communities); });
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      if (c) parent.postMessage({ type: 'figure-sized', fig: 'B_suitable_heatmap', width: c.scrollWidth, height: document.querySelector('.dev-wrapper').scrollHeight }, '*');
    }

    // Listen for in-place metric switch from parent
    window.addEventListener('message', e => {
      if (!e.data || e.data.type !== 'set-metric' || !e.data.metric) return;
      if (e.data.metric === currentMetric) return;
      currentMetric = e.data.metric;
      loadAndRender(currentMetric);
    });

    loadAndRender(currentMetric);
  </script>

<!-- CTP WP Engine Embed Helper -->
<script>
  if (window.self !== window.top) {
    document.body.classList.add('export-mode');
    window.addEventListener('load', () => {
      setTimeout(() => {
        const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
        if (c) {
          const fig = location.pathname.split('/').pop().replace('.html', '');
          parent.postMessage({
            type: 'figure-sized',
            fig: fig,
            width: c.scrollWidth,
            height: document.querySelector('.dev-wrapper').scrollHeight
          }, '*');
        }
      }, 100);
    });
  }
</script>
</body>

</html>
