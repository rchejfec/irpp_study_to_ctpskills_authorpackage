<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Skills Gaps by Community</title>
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="../tokens.css">
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/shift-away.css">
  <script src="../compact.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      height: var(--fig-height-short);
      padding: 6px 12px;
      display: flex;
      flex-direction: column;
    }



    .rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── One community row ── */
    .comm-row {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 2px;
      border-bottom: 1px solid var(--color-border-default);
    }

    .comm-row:last-child {
      border-bottom: none;
    }

    .comm-head {
      width: 19%;
      flex-shrink: 0;
    }

    .comm-name {
      display: block;
      font-weight: 700;
      font-size: 9.5px;
      color: var(--color-text-brand);
      line-height: 1.25;
    }

    .comm-count {
      display: block;
      font-size: 8px;
      /* was 7.5px — bumped to 6pt decorative floor */
      color: var(--color-text-secondary);
      margin-top: 1px;
    }

    /* ── Skill cells (top-N, side by side) ── */
    .skills {
      flex: 1;
      display: flex;
      gap: 7px;
    }

    .skill {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .skill-name {
      font-size: 9px;
      /* was 8.5px — bumped to ~7pt content floor */
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: auto;
      /* push bar row to bottom of flex column */
      padding: 0 10px 0 0;
    }

    .skill-meta {
      font-size: 8px;
      /* was 7px — bumped to 6pt decorative floor */
      color: var(--color-text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .track {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--color-surface-progress-track);
    }

    .bar {
      height: 4px;
      border-radius: 2px;
    }

    .skill.rank1 .bar {
      background: var(--color-chart-rank1);
    }

    .skill.rank2 .bar {
      background: var(--color-chart-rank2);
    }

    .skill.rank3 .bar {
      background: var(--color-chart-rank3);
    }

    .rank-tag {
      display: inline-block;
      font-size: 7px;
      /* was 6.5px — bumped toward 6pt decorative floor (bold+colored) */
      font-weight: 700;
      color: var(--color-text-inverse);
      background: var(--color-chart-rank1);
      border-radius: 2px;
      padding: 0 3px;
      margin-right: 3px;
      vertical-align: 1px;
    }

    .skill.rank2 .rank-tag {
      background: var(--color-chart-rank2);
    }

    .skill.rank3 .rank-tag {
      background: var(--color-chart-rank3);
    }

    /* ── COMPACT (<440px iframe width) — lossy per 2026-07-08 decisions:
       one featured (rank-1) Skills gap per community; ranks 2–3 collapse
       into a one-line "Also:" list, full detail in the tap-tooltip. ── */
    .skill-also {
      display: none;
    }

    html.compact .figure-container {
      width: 100%;
      height: auto;
      padding: 8px 12px 12px;
    }

    html.compact .dev-wrapper {
      padding: 8px;
    }

    html.compact .comm-row {
      flex: none;
      padding: 8px 2px;
      gap: 12px;
      align-items: center;
    }

    html.compact .comm-head {
      width: 38%;
    }

    html.compact .comm-name {
      font-size: 13px;
    }

    html.compact .comm-count {
      font-size: 11px;
    }

    html.compact .skills {
      gap: 0;
    }

    html.compact .skill-name {
      font-size: 12.5px;
    }

    html.compact .skill-meta {
      font-size: 11px;
    }

    html.compact .track,
    html.compact .bar {
      height: 6px;
      border-radius: 3px;
    }

    html.compact .rank-tag {
      font-size: 10px;
      padding: 0 4px;
    }

    html.compact .skill-also {
      display: block;
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.35;
      margin-top: 4px;
    }

    html.compact .skill-also strong {
      color: var(--color-text-primary);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="figure-container">
      <div class="rows" id="rows"></div>
    </div>
  </div>

  <script>
    // HTML-layer only: this view keeps the SKILLS domain and shows, per community,
    // its own top-N Skills gaps — the training-planning view for that community.
    // Source data (all four domains) is untouched — we read row.Skills_top.
    // Skills-only is the author-reviewed layout (DECISIONS.md, approved export
    // PNG); do not widen to per-domain without explicit user approval.
    const DOMAIN_TOP = 'Skills_top';
    const N = 3; // top-N skills shown per community

    const attr = s => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    // Wrap skill names: insert <br> after 3rd word if >3 words
    const wrapName = s => {
      const words = s.split(' ');
      if (words.length <= 3) return s;
      return words.slice(0, 3).join(' ') + '<br>' + words.slice(3).join(' ');
    };

    function cellTip(c, row, topList) {
      let t = `<div class="tt-title">${c.name}</div>`
        + `<div class="tt-value">Top gap in ${c.n_pairs} of ${row.total_pairs} curated transitions (${Math.round(c.pct)}%)</div>`
        + `<div class="tt-value">Avg. gap size: ${c.avg_gap.toFixed(2)} (RCA difference)</div>`;
      const runners = (topList || []).filter(x => x.name !== c.name).slice(0, 3);
      if (runners.length) {
        t += `<hr class="tt-divider"><div class="tt-value">Next most common:</div>`
          + runners.map(r => `<div class="tt-value">${r.name} — ${r.n_pairs} pair${r.n_pairs > 1 ? 's' : ''}</div>`).join('');
      }
      return t;
    }

    let J_DATA = null;

    function render() {
      if (!J_DATA) return;
      const compact = window.isCompact && window.isCompact();
      let html = '';
      J_DATA.forEach(row => {
        const top = (row[DOMAIN_TOP] || []).slice(0, N);
        let skills;
        if (compact) {
          // Rank-1 featured; ranks 2–3 as a one-line "Also:" list.
          const c = top[0];
          const also = top.slice(1).map(r => `<strong>${r.name}</strong>`).join(' · ');
          skills = c ? `
            <div class="skill rank1" data-tip="${attr(cellTip(c, row, row[DOMAIN_TOP]))}">
              <div class="skill-name"><span class="rank-tag">1</span>${c.name}</div>
              <div class="skill-meta">${c.n_pairs} of ${row.total_pairs} pairs</div>
              <div class="bar-row"><div class="track"><div class="bar" style="width:${Math.round(c.pct)}%"></div></div><span class="skill-meta">${c.n_pairs} of ${row.total_pairs}</span></div>
              ${also ? `<div class="skill-also">Also: ${also}</div>` : ''}
            </div>` : '<div class="skill"><div class="skill-meta">—</div></div>';
        } else {
          skills = top.map((c, i) => `
            <div class="skill rank${i + 1}" data-tip="${attr(cellTip(c, row, row[DOMAIN_TOP]))}">
              <div class="skill-name"><span class="rank-tag">${i + 1}</span>${wrapName(c.name)}</div>
              <div class="bar-row"><div class="track"><div class="bar" style="width:${Math.round(c.pct)}%"></div></div><span class="skill-meta">${c.n_pairs} of ${row.total_pairs}</span></div>
            </div>`).join('');
        }
        html += `
          <div class="comm-row">
            <div class="comm-head">
              <span class="comm-name">${row.community}</span>
              <span class="comm-count">${row.total_pairs} transitions</span>
            </div>
            <div class="skills">${skills}</div>
          </div>`;
      });
      document.getElementById('rows').innerHTML = html;
      reportSize();
    }

    function reportSize() {
      const c = document.querySelector('.figure-container');
      if (c) parent.postMessage({ type: 'figure-sized', fig: 'J_skills_gap_table', width: c.scrollWidth, height: document.querySelector('.dev-wrapper').scrollHeight }, '*');
    }

    window.addEventListener('compactmodechange', render);

    fetch('../data/J_skills_gap_table.json')
      .then(r => r.json())
      .then(DATA => {
        J_DATA = DATA;
        render();
        tippy.delegate(document.body, {
          target: '[data-tip]',
          theme: 'irpp',
          animation: 'shift-away',
          allowHTML: true,
          placement: 'top',
          appendTo: document.body,
          content: ref => ref.getAttribute('data-tip'),
        });
      });
  </script>

  <!-- CTP WP Engine Embed Helper -->
  <script>
    if (window.self !== window.top) {
      document.body.classList.add('export-mode');
      window.addEventListener('load', () => {
        setTimeout(() => {
          const c = document.querySelector('.figure-container') || document.querySelector('.appendix');
          if (c) {
            const fig = location.pathname.split('/').pop().replace('.html', '');
            parent.postMessage({
              type: 'figure-sized',
              fig: fig,
              width: c.scrollWidth,
              height: document.querySelector('.dev-wrapper').scrollHeight
            }, '*');
          }
        }, 100);
      });
    }
  </script>
</body>

</html>
