<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Skills Gap — Layered Bar Chart</title>
  <link rel="stylesheet" href="../theme.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    .figure-container {
      width: var(--fig-width);
      height: var(--fig-height);
      padding: 8px 10px;
      display: flex;
      gap: 10px;
    }

    .panel {
      flex: 1;
      border: 1px solid var(--clr-border);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header: two-column, no internal border ── */
    .panel-header {
      display: flex;
      background: var(--clr-bg-muted);
      border-bottom: 1px solid var(--clr-border);
      min-height: 42px;
      flex-shrink: 0;
    }

    .header-col {
      flex: 1;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-role {
      font-size: 6.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1;
      margin-bottom: 2px;
    }

    .header-occ {
      font-size: 9px;
      font-weight: 700;
      line-height: 1.25;
    }

    .header-col.source .header-role { color: var(--clr-body-secondary); }
    .header-col.source .header-occ { color: var(--irpp-red); }
    .header-col.target { text-align: right; }
    .header-col.target .header-role { color: var(--clr-body-secondary); }
    .header-col.target .header-occ { color: var(--irpp-teal); }

    /* ── Chart ── */
    .chart-area {
      flex: 1;
      position: relative;
    }
  </style>
</head>

<body>
  <div class="dev-wrapper">
    <div class="figure-container">

      <div class="panel" id="panel-0">
        <div class="panel-header" id="header-0"></div>
        <div class="chart-area"><svg id="chart-0"></svg></div>
      </div>

      <div class="panel" id="panel-1">
        <div class="panel-header" id="header-1"></div>
        <div class="chart-area"><svg id="chart-1"></svg></div>
      </div>

    </div>
  </div>

  <script>
    let PAIRS = [];

    // Wrap a label to at most two balanced lines on word boundaries. Honours an
    // explicit '\n' if the data already carries one. Labels at/under `max` chars
    // stay on one line; longer ones split near the middle word break.
    function wrapLabel(text, max) {
      if (text.includes('\n')) return text.split('\n');
      if (text.length <= max) return [text];
      const words = text.split(' ');
      if (words.length === 1) return [text];
      // Find the split point that most evenly balances the two lines.
      let best = 1, bestDiff = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ').length;
        const b = words.slice(i).join(' ').length;
        const diff = Math.abs(a - b);
        if (diff < bestDiff) { bestDiff = diff; best = i; }
      }
      return [words.slice(0, best).join(' '), words.slice(best).join(' ')];
    }

    // Theme colours
    const s = getComputedStyle(document.documentElement);
    const C = {
      src:     s.getPropertyValue('--irpp-red').trim(),
      srcLt:   s.getPropertyValue('--irpp-red-light').trim(),
      tgt:     s.getPropertyValue('--irpp-teal').trim(),
      tgtLt:   s.getPropertyValue('--irpp-teal-light').trim(),
      navy:    s.getPropertyValue('--irpp-navy').trim(),
      sage:    s.getPropertyValue('--irpp-sage').trim(),
      orange:  s.getPropertyValue('--irpp-orange').trim(),
      border:  s.getPropertyValue('--clr-border').trim(),
      grid:    s.getPropertyValue('--clr-gridline').trim(),
      body:    s.getPropertyValue('--clr-body').trim(),
      bodySec: s.getPropertyValue('--clr-body-secondary').trim(),
      bgMuted: s.getPropertyValue('--clr-bg-muted').trim(),
    };

    fetch('../data/I_skills_gap_bars.json')
      .then(r => r.json())
      .then(PAIRS => {
    PAIRS.forEach((pair, pi) => {
      // ── Header ──
      document.getElementById(`header-${pi}`).innerHTML = `
        <div class="header-col source">
          <div class="header-role">Susceptible</div>
          <div class="header-occ">${pair.source}</div>
        </div>
        <div class="header-col target">
          <div class="header-role">Viable</div>
          <div class="header-occ">${pair.target}</div>
        </div>
      `;

      // ── Chart sizing ──
      const area = document.querySelector(`#panel-${pi} .chart-area`);
      const W = area.clientWidth || 320;
      const H = area.clientHeight || 340;

      const margin = { top: 12, right: 16, bottom: 44, left: 120 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      const svg = d3.select(`#chart-${pi}`)
        .attr('width', W).attr('height', H);

      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      // Scales
      const maxRCA = d3.max(pair.comps, d => Math.max(d.src, d.tgt)) * 1.12;
      const x = d3.scaleLinear().domain([0, maxRCA]).range([0, w]);
      const y = d3.scaleBand()
        .domain(pair.comps.map(d => d.name))
        .range([0, h])
        .padding(0.42);

      const barH = y.bandwidth();

      // Gridlines
      x.ticks(3).forEach(tick => {
        g.append('line')
          .attr('x1', x(tick)).attr('x2', x(tick))
          .attr('y1', 0).attr('y2', h)
          .attr('stroke', C.grid).attr('stroke-width', 0.5);
      });

      // RCA = 1 line
      g.append('line')
        .attr('x1', x(1)).attr('x2', x(1))
        .attr('y1', -4).attr('y2', h + 4)
        .attr('stroke', C.navy).attr('stroke-width', 1.2)
        .attr('stroke-dasharray', '4,3').attr('opacity', 0.5);

      // ── Bars ──
      pair.comps.forEach(comp => {
        const cy = y(comp.name);

        // Fixed layering: target (teal) always behind, source (red) always in front
        // Back bar — target at low opacity
        g.append('rect')
          .attr('x', 0).attr('y', cy)
          .attr('width', x(comp.tgt)).attr('height', barH)
          .attr('fill', C.tgt).attr('opacity', 0.35)
          .attr('rx', 2);

        // Front bar — source, slightly transparent
        g.append('rect')
          .attr('x', 0).attr('y', cy)
          .attr('width', x(comp.src)).attr('height', barH)
          .attr('fill', C.src).attr('opacity', 0.50)
          .attr('rx', 2);

        // ── Y-axis: label (right-justified, auto-wrapped to ≤2 lines) + pill ──
        const lines = wrapLabel(comp.name, 18);
        const labelY = cy + barH / 2 - (lines.length > 1 ? 6 : 0);

        lines.forEach((line, li) => {
          g.append('text')
            .attr('x', -8).attr('y', labelY + li * 11)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'end')
            .attr('font-size', '8.5px')
            .attr('font-weight', '600')
            .attr('fill', C.body)
            .text(line);
        });

        // Pill below the label — bigger, properly centered
        const pillClr = comp.type === 'shared' ? C.sage : C.orange;
        const pillText = comp.type === 'shared' ? 'SHARED' : 'GAP';
        const pillW = pillText.length * 5.5 + 10;
        const pillH = 13;
        const pillY = labelY + (lines.length > 1 ? 24 : 16);

        g.append('rect')
          .attr('x', -8 - pillW).attr('y', pillY - pillH / 2)
          .attr('width', pillW).attr('height', pillH)
          .attr('fill', pillClr).attr('rx', 2.5);
        g.append('text')
          .attr('x', -8 - pillW / 2).attr('y', pillY)
          .attr('dy', '0.35em')
          .attr('text-anchor', 'middle')
          .attr('font-size', '7px').attr('font-weight', '700')
          .attr('fill', '#fff').attr('letter-spacing', '0.6px')
          .text(pillText);
      });

      // ── X-axis ──
      const xAxis = g.append('g')
        .attr('transform', `translate(0,${h})`);

      xAxis.call(
        d3.axisBottom(x).ticks(3).tickSize(4)
          .tickFormat(d => d.toFixed(1))
      ).attr('font-size', '7.5px');

      xAxis.select('.domain').attr('stroke', C.border);
      xAxis.selectAll('.tick line').attr('stroke', C.border);

      // X-axis annotation: left label + right label + arrow
      // "← Less reliance" on left, "More reliance →" on right
      const annotY = 26;

      g.append('text')
        .attr('x', 0).attr('y', h + annotY)
        .attr('font-size', '9.5px').attr('fill', C.bodySec)
        .attr('font-weight', '600')
        .text('← Less reliance');

      g.append('text')
        .attr('x', w).attr('y', h + annotY)
        .attr('text-anchor', 'end')
        .attr('font-size', '9.5px').attr('fill', C.bodySec)
        .attr('font-weight', '600')
        .text('More reliance →');

      // RCA label centered
      g.append('text')
        .attr('x', w / 2).attr('y', h + annotY)
        .attr('text-anchor', 'middle')
        .attr('font-size', '9px').attr('fill', C.bodySec)
        .text('RCA');
    });
      });
  </script>
</body>

</html>
